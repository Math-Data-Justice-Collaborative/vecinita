# Continuous deployment of Modal apps (ADR-002 hybrid: Modal workers + DO control plane).
# Deploys embedding (CPU), data-management (ASGI / data path), and llm (GPU / T4) to the
# vecinita workspace. Triggered only after the full CI suite passes on main.
#
# EV-007 redeploy order: Supabase config/migrations push runs in the `supabase-sync` job
# before Modal deploy. DigitalOcean deploy chains after this workflow completes.
# Resend SMTP is applied via Supabase `config push` (SUPABASE_SMTP_PASS); Resend REST
# test-send uses Modal operator secrets (RESEND_API_KEY) — not pushed by CI.
#
# Pattern: https://modal.com/docs/guide/continuous-deployment
name: Deploy Modal

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Never cancel an in-progress deploy; serialize redeploys instead.
concurrency:
  group: deploy-modal
  cancel-in-progress: false

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF: cfuvghdsuwactfeamtym
  # Pinned Supabase CLI — same constraint as supabase.yml (ADR-030 §8).
  SUPABASE_CLI_VERSION: "2.84.2"

jobs:
  supabase-sync:
    runs-on: ubuntu-latest
    # CI runs on several branches; only sync when CI succeeded on main.
    # workflow_dispatch is always allowed (manual redeploy).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SMTP_PASS: ${{ secrets.SUPABASE_SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Supabase access token
        id: supabase_token
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN not configured — skipping Supabase sync"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.supabase_token.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push Supabase config, templates, and migrations
        if: steps.supabase_token.outputs.skip != 'true'
        run: bash scripts/supabase/ci_sync.sh sync-production

  deploy:
    runs-on: ubuntu-latest
    needs: supabase-sync
    # CI runs on several branches; only deploy when CI succeeded on main.
    # workflow_dispatch is always allowed (manual redeploy).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Require Modal tokens
        run: |
          if [ -z "${MODAL_TOKEN_ID}" ] || [ -z "${MODAL_TOKEN_SECRET}" ]; then
            echo "::error::MODAL_TOKEN_ID / MODAL_TOKEN_SECRET repo secrets are not set." >&2
            echo "Add them under Settings -> Secrets and variables -> Actions." >&2
            echo "See https://modal.com/docs/guide/continuous-deployment" >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: pip install 'modal>=1.2.6,<2'

      - name: Build smoke (uv sync + Modal app import)
        run: bash scripts/deploy/verify_build.sh

      - name: Verify Modal secrets and volumes
        run: bash scripts/deploy/verify_secrets.sh

      - name: Deploy Modal apps (embedding, data-management, llm)
        run: bash scripts/deploy/modal.sh

      - name: List deployed apps
        run: modal app list
