services:
  # Root production blueprint for the Vecinita control plane.
  # Includes chat stack services and data-management frontend/API services.
  # Modal deploy targets (scraper/embedding/model) remain managed by Modal.
  #
  # All env vars are controlled by the shared env group in the Render dashboard.
  # Use the SAME variable names as .env.prod.render.example (values live in
  # gitignored .env.prod.render — never commit secrets). Only infrastructure
  # bindings (fromDatabase, fromService) and PORT are declared here. Everything
  # else uses sync: false so the env group value is never overwritten by this blueprint.
  #
  # Key ownership legend (for .env.prod.render governance):
  #   CORE   — shared infrastructure: DATABASE_URL, ALLOWED_ORIGINS
  #   AGENT  — consumed by vecinita-agent service
  #   MODAL  — Modal SDK / upstream endpoint refs (consumed by agent/gateway)
  #   GW     — consumed by vecinita-gateway service
  #   FE     — consumed by vecinita-frontend (VITE_* vars)
  #   STRICT — strict-mode / enforcement flags for prod services
  # See docs/deployment/RENDER_SHARED_ENV_CONTRACT.md for the full contract.
  #
  # autoDeployTrigger: checksPass — Render deploys only after linked-branch CI checks
  # succeed (GitHub Actions / Checks API). See https://render.com/docs/deploys#configuring-auto-deploys
  - type: web
    name: vecinita-agent
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      # Split connection bindings for tools/services that consume component DB vars.
      - key: DB_HOST
        fromDatabase:
          name: vecinita-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: vecinita-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: vecinita-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: vecinita-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: vecinita-postgres
          property: password
      - key: PGHOST
        fromDatabase:
          name: vecinita-postgres
          property: host
      - key: PGPORT
        fromDatabase:
          name: vecinita-postgres
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: vecinita-postgres
          property: database
      - key: PGUSER
        fromDatabase:
          name: vecinita-postgres
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: vecinita-postgres
          property: password
      # All remaining vars come from the shared env group — sync: false
      # ensures this blueprint never overwrites dashboard/env-group values.
      - key: PYTHONUNBUFFERED
        sync: false
      - key: TF_ENABLE_ONEDNN_OPTS
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: VECINITA_MODEL_API_URL
        sync: false
      - key: VECINITA_EMBEDDING_API_URL
        sync: false
      - key: VECINITA_SCRAPER_API_URL
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: EMBEDDING_STRICT_STARTUP
        sync: false
      - key: RENDER_REMOTE_INFERENCE_ONLY
        sync: false
      - key: RENDER_DISABLE_LOCAL_GUARDRAILS
        sync: false
      - key: DEFAULT_PROVIDER
        sync: false
      - key: DEFAULT_MODEL
        sync: false
      - key: FORCE_LOCAL_MODAL_LLM
        sync: false
      - key: LOCK_MODEL_SELECTION
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_FUNCTION_INVOCATION
        sync: false
      - key: REINDEX_SERVICE_URL
        sync: false
      - key: REINDEX_TRIGGER_TOKEN
        sync: false
      - key: BACKEND_PREFLIGHT_ENABLED
        sync: false
      - key: BACKEND_PREFLIGHT_STRICT
        sync: false
      - key: POSTGRES_AUTO_CREATE_VECTOR_EXTENSION
        value: "true"
      - key: POSTGRES_AUTO_BOOTSTRAP_SCHEMA
        value: "true"
      - key: GUARDRAILS_REQUIRE_HUB_VALIDATOR
        sync: false
      - key: GUARDRAILS_HUB_AUTO_INSTALL
        sync: false
      - key: GUARDRAILS_PERSISTENCE_DIR
        sync: false
      - key: DB_DATA_MODE
        sync: false
      - key: VECTOR_SYNC_TARGET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false

  - type: web
    name: vecinita-frontend
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      # All remaining vars come from the shared env group.
      - key: VITE_GATEWAY_URL
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_AGENT_REQUEST_TIMEOUT_MS
        sync: false
      - key: VITE_AGENT_STREAM_TIMEOUT_MS
        sync: false
      - key: VITE_AGENT_STREAM_FIRST_EVENT_TIMEOUT_MS
        sync: false
      - key: VITE_DEV_ADMIN_ENABLED
        sync: false
      - key: VITE_DEV_ADMIN_EMAIL
        sync: false
      - key: VITE_DEV_ADMIN_PASSWORD
        sync: false
      - key: VITE_DEV_ADMIN_TOKEN
        sync: false

  - type: web
    name: vecinita-gateway
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile.gateway
    dockerContext: ./backend
    dockerCommand: /bin/sh ./scripts/start_gateway_render.sh
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: AGENT_SERVICE_URL
        fromService:
          name: vecinita-agent
          type: web
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      # Optional (env group): MODAL_SCRAPER_PERSIST_VIA_GATEWAY=1 — gateway owns scraping_jobs rows;
      # Modal submit only enqueues. Uses this internal DATABASE_URL (see RENDER_SHARED_ENV_CONTRACT.md).
      # Split connection bindings for tools/services that consume component DB vars.
      - key: DB_HOST
        fromDatabase:
          name: vecinita-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: vecinita-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: vecinita-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: vecinita-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: vecinita-postgres
          property: password
      - key: PGHOST
        fromDatabase:
          name: vecinita-postgres
          property: host
      - key: PGPORT
        fromDatabase:
          name: vecinita-postgres
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: vecinita-postgres
          property: database
      - key: PGUSER
        fromDatabase:
          name: vecinita-postgres
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: vecinita-postgres
          property: password
      # All remaining vars come from the shared env group.
      - key: PYTHONUNBUFFERED
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: AGENT_TIMEOUT
        sync: false
      - key: AGENT_STREAM_TIMEOUT
        sync: false
      - key: VECINITA_EMBEDDING_API_URL
        sync: false
      - key: VECINITA_MODEL_API_URL
        sync: false
      - key: VECINITA_SCRAPER_API_URL
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_FUNCTION_INVOCATION
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: DEV_ADMIN_ENABLED
        sync: false
      - key: DEV_ADMIN_BEARER_TOKEN
        sync: false
      - key: SCRAPER_API_KEYS
        sync: false
      - key: SCRAPER_DEBUG_BYPASS_AUTH
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: ENABLE_LLM_TAG_ENHANCEMENT
        sync: false
      - key: LLM_TAG_PROVIDER
        sync: false
      - key: DEEPSEEK_TAG_MODEL
        sync: false
      - key: GROQ_TAG_MODEL
        sync: false
      - key: DB_DATA_MODE
        sync: false
      - key: VECTOR_SYNC_TARGET
        sync: false

  - type: web
    name: vecinita-data-management-frontend-v1
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./apps/data-management-frontend/Dockerfile
    dockerContext: ./apps/data-management-frontend
    autoDeployTrigger: checksPass
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: VITE_VECINITA_SCRAPER_API_URL
        sync: false
      - key: VITE_VECINITA_MODEL_API_URL
        sync: false
      - key: VITE_VECINITA_EMBEDDING_API_URL
        sync: false
      - key: VITE_DEFAULT_SCRAPER_USER_ID
        sync: false

  # API image is vecinita-scraper. Build from the monorepo's top-level
  # services/scraper submodule — no nested checkouts under services/data-management-api
  # (backend service submodules removed per 003-consolidate-scraper-dm).
  - type: web
    name: vecinita-data-management-api-v1
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./services/scraper/Dockerfile
    dockerContext: ./services/scraper
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_WORKSPACE
        sync: false
      - key: VECINITA_MODEL_API_URL
        sync: false
      - key: VECINITA_EMBEDDING_API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SCRAPER_API_KEYS
        sync: false
      - key: SCRAPER_DEBUG_BYPASS_AUTH
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: UPSTREAM_TIMEOUT_SECONDS
        value: "55"

databases:
  - name: vecinita-postgres
    region: virginia
    plan: basic-256mb
    databaseName: vecinita
    user: vecinita
    postgresMajorVersion: "16"
    diskSizeGB: 1
    ipAllowList: []
