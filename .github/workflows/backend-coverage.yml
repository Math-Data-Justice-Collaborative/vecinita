name: Backend Coverage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apis/gateway/**'
      - 'apis/agent/**'
      - '.github/workflows/backend-coverage.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apis/gateway/**'
      - 'apis/agent/**'
      - '.github/workflows/backend-coverage.yml'
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout contract test submodules
      run: git submodule update --init --depth 1 modal-apps/embedding-modal modal-apps/model-modal

    - name: Validate production Render env contract
      run: python3 scripts/github/validate_render_env.py .env.prod.render

    - name: Validate staging Render env contract
      run: python3 scripts/github/validate_render_env.py .env.staging.render

    - name: Validate Render env key parity (prod vs staging)
      run: python3 scripts/github/validate_render_env_parity.py .env.prod.render .env.staging.render

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: apis/gateway
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    - name: Create .env file for tests
      working-directory: apis/gateway
      run: |
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "OLLAMA_MODEL=gemma3" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "EMBEDDING_STRICT_STARTUP=false" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env

    - name: Run backend fast tests with coverage
      working-directory: apis/gateway
      env:
        PYTHONPATH: ${{ github.workspace }}/apis/gateway:${{ github.workspace }}/modal-apps/embedding-modal/src
        SKIP_AGENT_MAIN_IMPORT: 'true'
        EMBEDDING_STRICT_STARTUP: 'false'
      run: |
        pytest tests/ -m "not integration and not e2e and not llm" -v --tb=short \
          --cov=vecinita.app \
          --cov=src.services.embedding.models \
          --cov=src.utils.tags \
          --cov-config=.coveragerc.unit --cov-report=xml --cov-report=term --junit-xml=test-results.xml \
          --cov-fail-under=98

    - name: Run backend schema conformance suite
      working-directory: apis/gateway
      env:
        PYTHONPATH: ${{ github.workspace }}/apis/gateway
        EMBEDDING_STRICT_STARTUP: 'false'
        SCHEMATHESIS_HOOKS: tests.schemathesis_hooks
        SCRAPER_API_KEYS: ${{ secrets.SCRAPER_API_KEYS }}
        SCRAPER_SCHEMATHESIS_BEARER: ${{ secrets.SCRAPER_SCHEMATHESIS_BEARER }}
      run: |
        pytest tests/integration/test_api_schema_schemathesis.py -q \
          --tracecov-format=html,text \
          --tracecov-report-html-path=schema-coverage-gateway-pytest.html \
          --junit-xml=schema-test-results-gateway.xml
        pytest tests/integration/test_agent_api_schema_schemathesis.py -q \
          --tracecov-format=html,text \
          --tracecov-report-html-path=schema-coverage-agent-pytest.html \
          --junit-xml=schema-test-results-agent.xml
        pytest tests/integration/test_data_management_api_schema_schemathesis.py -q \
          --tracecov-format=html,text \
          --tracecov-report-html-path=schema-coverage-data-management-pytest.html \
          --junit-xml=schema-test-results-data-management.xml

    - name: Summarize coverage
      working-directory: apis/gateway
      run: |
        python - <<'PY'
        import xml.etree.ElementTree as ET

        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        line_rate = float(root.attrib.get('line-rate', 0.0)) * 100
        print(f"Backend line coverage: {line_rate:.2f}%")
        with open('coverage-summary.txt', 'w', encoding='utf-8') as f:
            f.write(f"Backend line coverage: {line_rate:.2f}%\n")
        PY

    - name: Upload backend coverage and schema artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-and-schema-artifacts
        path: |
          apis/gateway/coverage.xml
          apis/gateway/test-results.xml
          apis/gateway/schema-test-results-gateway.xml
          apis/gateway/schema-test-results-agent.xml
          apis/gateway/schema-test-results-data-management.xml
          apis/gateway/coverage-summary.txt
          apis/gateway/schema-coverage.html
          apis/gateway/schema-coverage-gateway-pytest.html
          apis/gateway/schema-coverage-agent-pytest.html
          apis/gateway/schema-coverage-data-management-pytest.html
          apis/gateway/schemathesis-report/schema-coverage-*.html
        if-no-files-found: warn

