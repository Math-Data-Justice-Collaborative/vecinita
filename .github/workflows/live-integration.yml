name: Live Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (production or staging)"
        required: false
        default: "production"
        type: choice
        options: [production, staging]
  workflow_call:
    secrets:
      RENDER_GATEWAY_URL:
        required: false
      RENDER_AGENT_URL:
        required: false
      RENDER_FRONTEND_URL:
        required: false

jobs:
  live-integration:
    name: Live Integration (${{ inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    env:
      RENDER_GATEWAY_URL: ${{ secrets.RENDER_GATEWAY_URL }}
      RENDER_AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL }}
      RENDER_FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check required secrets are set
        run: |
          if [ -z "$RENDER_GATEWAY_URL" ]; then
            echo "::warning::RENDER_GATEWAY_URL not set — live tests will be skipped"
          fi

      - name: Run live integration tests
        run: |
          uv run pytest tests/live/ -m live \
            --timeout=120 \
            -v \
            --tb=short \
            --junit-xml=live-integration-results.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-integration-results
          path: backend/live-integration-results.xml
          if-no-files-found: ignore
