name: Env Sync Contract

on:
  push:
    branches: [main, develop]
    paths:
      - "render.yaml"
      - "render.staging.yaml"
      - ".env.prod.render.example"
      - ".env.staging.render.example"
      - ".env.local.example"
      - ".github/workflows/**"
      - "scripts/github/validate_render_env.py"
      - "scripts/github/validate_render_env_parity.py"
      - "services/**/config.py"
      - "services/**/shared_config/**"
      - "backend/src/utils/render_env_contract.py"
  pull_request:
    branches: [main, develop]
    paths:
      - "render.yaml"
      - "render.staging.yaml"
      - ".env.prod.render.example"
      - ".env.staging.render.example"
      - ".env.local.example"
      - ".github/workflows/**"
      - "scripts/github/validate_render_env.py"
      - "scripts/github/validate_render_env_parity.py"
      - "services/**/config.py"
      - "services/**/shared_config/**"
      - "backend/src/utils/render_env_contract.py"
  workflow_dispatch:

jobs:
  env-sync-contract:
    name: Env Key Sync Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run env sync contract tests
        env:
          SKIP_AGENT_MAIN_IMPORT: "true"
        run: uv run pytest tests/contracts/test_env_sync_contract.py -v --tb=short -m contract
