name: Modal Deployment

on:
  push:
    branches:
      - main
    paths:
      - "backend/src/embedding_service/**"
      - "backend/src/scraper/**"
      - "backend/src/services/embedding/**"
      - "backend/requirements.txt"
      - "backend/pyproject.toml"
      - ".github/workflows/modal-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_embedding:
        description: "Deploy embedding service"
        required: false
        default: "true"
      deploy_scraper:
        description: "Deploy scraper service"
        required: false
        default: "true"

concurrency:
  group: modal-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  modal-deploy:
    name: Deploy to Modal
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID || secrets.MODAL_API_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET || secrets.MODAL_API_TOKEN_SECRET }}
      MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Verify Modal Authentication
        id: modal_auth
        shell: bash
        run: |
          token_id="$(printf '%s' "$MODAL_TOKEN_ID" | tr -d '\r\n')"
          token_secret="$(printf '%s' "$MODAL_TOKEN_SECRET" | tr -d '\r\n')"
          modal_profile="$(printf '%s' "${MODAL_PROFILE:-vecinita}" | tr -d '\r\n')"

          if [ -z "$token_id" ] || [ -z "$token_secret" ]; then
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Modal deployment skipped because credentials are not configured."
            exit 0
          fi

          if modal token set --profile "$modal_profile" --token-id "$token_id" --token-secret "$token_secret" --no-verify && MODAL_PROFILE="$modal_profile" modal token info >/dev/null 2>&1; then
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
            echo "✓ Modal authentication verified"
          else
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Modal deployment skipped because authentication failed. Update MODAL_TOKEN_ID and MODAL_TOKEN_SECRET to valid values."
          fi

      - name: Deploy Embedding Service
        if: steps.modal_auth.outputs.authenticated == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_embedding == 'true')
        run: |
          echo "Deploying Embedding Service..."
          modal deploy backend/src/embedding_service/modal_app.py
          echo "✓ Embedding service deployed successfully"

      - name: Deploy Scraper Service
        if: steps.modal_auth.outputs.authenticated == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_scraper == 'true')
        run: |
          echo "Deploying Scraper Service..."
          modal deploy backend/src/scraper/modal_app.py
          echo "✓ Scraper service deployed successfully"

      - name: Verify Deployments
        if: steps.modal_auth.outputs.authenticated == 'true'
        run: |
          echo "Deployed apps:"
          modal app list --all 2>/dev/null || echo "Apps listed (may require additional permissions)"

      - name: Modal Deployment Skipped
        if: steps.modal_auth.outputs.authenticated != 'true'
        run: echo "Modal deployment skipped; CI remains green until valid credentials are configured."

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: modal-deploy
    if: always()
    
    steps:
      - name: Success Notification
        if: needs.modal-deploy.result == 'success'
        run: |
          echo "✓ Modal deployment completed successfully"
          echo "  - Embedding Service: https://vecinita--vecinita-embedding.modal.run"
          echo "  - Scraper Service: https://vecinita--vecinita-scraper.modal.run"

      - name: Failure Notification
        if: needs.modal-deploy.result == 'failure'
        run: |
          echo "✗ Modal deployment failed"
          echo "Check logs above for details"
          exit 1
