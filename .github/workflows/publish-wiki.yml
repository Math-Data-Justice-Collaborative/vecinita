# Publish docs/ subset to GitHub Wiki — see docs/wiki-manifest.json
#
# Wiki push authentication:
#   GitHub's default GITHUB_TOKEN cannot push to *.wiki.git reliably — wiki repos
#   sit in a separate permission scope. Create a fine-grained PAT (Contents: Read and
#   write on this repo) or classic PAT with `repo` scope, save as repo secret
#   WIKI_PUSH_TOKEN. The workflow falls back to GITHUB_TOKEN with a warning if unset.
name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "docs/wiki-manifest.json"
      - "scripts/docs/**"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:
    inputs:
      include_operator:
        description: Include operator-only runbooks (staging URLs, secrets matrix)
        type: boolean
        default: false

concurrency:
  group: publish-wiki-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dry-run wiki build (validate manifest + links)
        run: |
          OP_FLAGS="--no-include-operator"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_operator }}" = "true" ]; then
            OP_FLAGS="--include-operator"
          fi
          uv run python scripts/docs/sync_github_wiki.py \
            --dry-run \
            $OP_FLAGS

      - name: Push to GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          WIKI_ACTOR: ${{ github.actor }}
          WIKI_REPOSITORY: ${{ github.repository }}
        run: |
          OP_FLAGS="--no-include-operator"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_operator }}" = "true" ]; then
            OP_FLAGS="--include-operator"
          fi
          if [ -z "${{ secrets.WIKI_PUSH_TOKEN }}" ]; then
            echo "::warning::WIKI_PUSH_TOKEN is not set — using GITHUB_TOKEN for wiki push (often fails with 403/404). Add a PAT as WIKI_PUSH_TOKEN repo secret."
          else
            echo "Using WIKI_PUSH_TOKEN for wiki push."
          fi
          WIKI_REMOTE="$(uv run python - <<'PY'
          import os
          from scripts.docs.sync_github_wiki import build_wiki_remote_url
          print(
              build_wiki_remote_url(
                  repository=os.environ["WIKI_REPOSITORY"],
                  token=os.environ["WIKI_TOKEN"],
                  actor=os.environ["WIKI_ACTOR"],
              )
          )
          PY
          )"
          uv run python scripts/docs/sync_github_wiki.py \
            --remote-url "$WIKI_REMOTE" \
            --message "Sync docs from ${{ github.sha }}" \
            $OP_FLAGS
