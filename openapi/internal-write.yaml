openapi: 3.0.3
info:
  title: Vecinita DO Internal Write API
  version: 0.3.0
  description: Service-to-service writes from Modal workers (sole DATABASE_URL holder).
servers:
  - url: /internal/v1
    description: Internal write API (DigitalOcean)
paths:
  /documents/batch:
    post:
      operationId: upsertDocumentsBatch
      summary: Upsert documents, chunks, and embeddings
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpsertRequest"
      responses:
        "200":
          description: Upsert counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpsertResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents:
    get:
      operationId: listDocuments
      summary: List corpus documents
      security:
        - internalApiKey: []
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}:
    delete:
      operationId: deleteDocument
      summary: Delete document and dependent chunks/embeddings
      security:
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}/chunks:
    get:
      operationId: listDocumentChunks
      summary: List chunks for admin viewer
      security:
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chunk list with tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChunkDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/{document_id}/tags:
    patch:
      operationId: patchDocumentTags
      summary: Replace document tags (human or llm batch)
      security:
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPatchRequest"
      responses:
        "200":
          description: Updated tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/{document_id}/retag:
    post:
      operationId: retagDocumentLlm
      summary: Re-run LLM tagging for a document
      security:
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated tags from LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /chunks/{chunk_id}/tags:
    patch:
      operationId: patchChunkTags
      summary: Replace chunk-level tags
      security:
        - internalApiKey: []
      parameters:
        - name: chunk_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPatchRequest"
      responses:
        "200":
          description: Updated chunk tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/bulk:
    delete:
      operationId: bulkDeleteDocuments
      summary: Bulk delete documents (EV-002 F27)
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/tags:
    patch:
      operationId: bulkTagDocuments
      summary: Bulk add/remove tags (EV-002 F27)
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkTagRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/retag:
    post:
      operationId: bulkRetagDocuments
      summary: Bulk LLM retag (EV-002 F27)
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "202":
          description: Retag jobs enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRetagResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/metadata:
    patch:
      operationId: bulkUpdateMetadata
      summary: Bulk update document metadata (EV-002 F27)
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMetadataRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}/history:
    get:
      operationId: getDocumentHistory
      summary: Per-document audit history (EV-002 F29)
      security:
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document history events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /audit:
    get:
      operationId: getAuditLog
      summary: Query audit log with filters (EV-002 F29)
      security:
        - internalApiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: event_type
          in: query
          schema:
            type: string
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/served:
    post:
      operationId: recordStatsServed
      summary: Increment serving counters (EV-002 F28)
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatsServedRequest"
      responses:
        "202":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsServedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/top-served:
    get:
      operationId: getTopServed
      summary: Top served documents ranked (EV-002 F28)
      security:
        - internalApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Ranked list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopServedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/summary:
    get:
      operationId: getStatsSummary
      summary: Dashboard aggregate statistics (EV-002 F25)
      security:
        - internalApiKey: []
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /health/all:
    get:
      operationId: getHealthAggregate
      summary: Aggregate health of all services (EV-002 F26)
      security:
        - internalApiKey: []
      responses:
        "200":
          description: Service health grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthAggregateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /health:
    get:
      operationId: health
      summary: Service health
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  securitySchemes:
    internalApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: VECINITA_INTERNAL_API_KEY
  schemas:
    EmbeddingVector:
      type: array
      minItems: 384
      maxItems: 384
      items:
        type: number
        format: float
    ChunkUpsert:
      type: object
      required:
        - chunk_index
        - text
        - embedding
      properties:
        chunk_index:
          type: integer
          minimum: 0
        text:
          type: string
        embedding:
          $ref: "#/components/schemas/EmbeddingVector"
    DocumentUpsert:
      type: object
      required:
        - url
        - chunks
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
          nullable: true
        content_hash:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        chunks:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChunkUpsert"
        tags:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/TagInput"
    TagInput:
      type: object
      required:
        - slug
        - label
      properties:
        slug:
          type: string
        label:
          type: string
        source:
          type: string
          enum:
            - llm
            - human
    TagPatchRequest:
      type: object
      required:
        - tags
        - source
      properties:
        tags:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/TagInput"
        source:
          type: string
          enum:
            - llm
            - human
    TagPatchResponse:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagInput"
    ChunkDetail:
      type: object
      required:
        - chunk_id
        - chunk_index
        - text
      properties:
        chunk_id:
          type: string
          format: uuid
        chunk_index:
          type: integer
        text:
          type: string
        token_count:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagInput"
    BatchUpsertRequest:
      type: object
      additionalProperties: false
      required:
        - documents
      properties:
        documents:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/DocumentUpsert"
    BatchUpsertResponse:
      type: object
      required:
        - upserted_chunks
      properties:
        upserted_chunks:
          type: integer
          minimum: 0
    DocumentSummary:
      type: object
      required:
        - document_id
        - url
      properties:
        document_id:
          type: string
          format: uuid
        url:
          type: string
        title:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagInput"
    BulkDeleteRequest:
      type: object
      required:
        - document_ids
      properties:
        document_ids:
          type: array
          maxItems: 100
          items:
            type: string
            format: uuid
    BulkTagRequest:
      type: object
      required:
        - document_ids
      properties:
        document_ids:
          type: array
          maxItems: 100
          items:
            type: string
            format: uuid
        add:
          type: array
          items:
            $ref: "#/components/schemas/TagInput"
        remove:
          type: array
          items:
            type: string
    BulkMetadataRequest:
      type: object
      required:
        - document_ids
      properties:
        document_ids:
          type: array
          maxItems: 100
          items:
            type: string
            format: uuid
        title:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
    BulkResultResponse:
      type: object
      required:
        - successes
        - failures
      properties:
        successes:
          type: array
          items:
            type: string
            format: uuid
        failures:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
                format: uuid
              error:
                type: string
    BulkRetagResponse:
      type: object
      required:
        - successes
        - failures
      properties:
        successes:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
                format: uuid
              job_id:
                type: string
        failures:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
                format: uuid
              error:
                type: string
    AuditEvent:
      type: object
      required:
        - id
        - event_type
        - entity_type
        - entity_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        request_id:
          type: string
          format: uuid
        payload:
          type: object
        created_at:
          type: string
          format: date-time
    AuditLogResponse:
      type: object
      required:
        - events
        - total
        - page
        - page_size
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    StatsServedRequest:
      type: object
      required:
        - document_ids
      properties:
        document_ids:
          type: array
          items:
            type: string
            format: uuid
    StatsServedResponse:
      type: object
      required:
        - acknowledged
      properties:
        acknowledged:
          type: boolean
        count:
          type: integer
    TopServedResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
                format: uuid
              title:
                type: string
                nullable: true
              served_count:
                type: integer
    StatsSummaryResponse:
      type: object
      required:
        - total_documents
        - total_chunks
      properties:
        total_documents:
          type: integer
        total_chunks:
          type: integer
        tag_distribution:
          type: array
          items:
            type: object
            properties:
              tag:
                type: string
              count:
                type: integer
        language_breakdown:
          type: array
          items:
            type: object
            properties:
              language:
                type: string
              count:
                type: integer
        recent_activity:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        top_served:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
                format: uuid
              title:
                type: string
                nullable: true
              served_count:
                type: integer
    ServiceHealth:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
        status:
          type: string
          enum:
            - healthy
            - unhealthy
        latency_ms:
          type: number
          nullable: true
        error:
          type: string
          nullable: true
    HealthAggregateResponse:
      type: object
      required:
        - overall
        - services
        - checked_at
      properties:
        overall:
          type: string
          enum:
            - healthy
            - degraded
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceHealth"
        checked_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ErrorBody:
      type: object
      properties:
        detail:
          type: string
  responses:
    ValidationError:
      description: Invalid payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Unauthorized:
      description: Missing or invalid internal API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    NotFound:
      description: Unknown document
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
