# Deploy Vecinita Modal apps after the main CI workflow succeeds.
#
# Pattern aligns with Modal continuous deployment guidance:
# https://modal.com/docs/guide/continuous-deployment
# https://modal.com/docs/guide/managing-deployments
#
# Requires GitHub Actions secrets: MODAL_TOKEN_ID and MODAL_TOKEN_SECRET
# (aliases MODAL_API_TOKEN_* / MODAL_AUTH_* are also read in the deploy job).

name: Modal Deployment

on:
  # Run only after the full "Tests" suite completes successfully on main (same commit).
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_embedding:
        description: "Deploy embedding service (services/embedding-modal)"
        required: false
        default: "true"
      deploy_model:
        description: "Deploy model service (services/model-modal)"
        required: false
        default: "true"
      deploy_scraper:
        description: "Deploy scraper workers + API (services/scraper)"
        required: false
        default: "true"

concurrency:
  group: modal-deploy-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  modal-deploy:
    name: Deploy to Modal
    runs-on: ubuntu-latest
    # workflow_dispatch: always; workflow_run: only successful upstream run on main from this repo.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    permissions:
      contents: read

    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID || secrets.MODAL_API_TOKEN_ID || secrets.MODAL_AUTH_KEY }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET || secrets.MODAL_API_TOKEN_SECRET || secrets.MODAL_AUTH_SECRET }}
      MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}
      MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT || secrets.MODAL_ENVIRONMENT || '' }}

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 1

      - name: Init service submodules
        run: |
          git submodule update --init --depth 1 \
            services/embedding-modal \
            services/model-modal \
            services/scraper

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install "modal>=1.3.0"

      - name: Sync service environments (locked)
        run: |
          ( cd services/embedding-modal && uv sync --frozen )
          ( cd services/model-modal && uv sync --frozen )
          ( cd services/scraper && uv sync --frozen )

      - name: Verify Modal authentication
        id: modal_auth
        shell: bash
        run: |
          token_id="$(printf '%s' "$MODAL_TOKEN_ID" | tr -d '\r\n')"
          token_secret="$(printf '%s' "$MODAL_TOKEN_SECRET" | tr -d '\r\n')"
          modal_profile="$(printf '%s' "${MODAL_PROFILE:-vecinita}" | tr -d '\r\n')"

          if [ -z "$token_id" ] || [ -z "$token_secret" ]; then
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Modal deploy skipped: add MODAL_TOKEN_ID and MODAL_TOKEN_SECRET (see Modal CD docs)."
            exit 0
          fi

          if modal token set --profile "$modal_profile" --token-id "$token_id" --token-secret "$token_secret" --no-verify \
            && MODAL_PROFILE="$modal_profile" modal token info >/dev/null 2>&1; then
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
            echo "✓ Modal authentication verified"
          else
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Modal deploy skipped: token set or verification failed."
          fi

      - name: Deploy embedding Modal app
        if: >-
          steps.modal_auth.outputs.authenticated == 'true' &&
          (
            github.event_name == 'workflow_run' ||
            github.event.inputs.deploy_embedding == 'true'
          )
        env:
          MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}
          MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT || secrets.MODAL_ENVIRONMENT || '' }}
        run: |
          echo "Deploying vecinita-embedding (commit ${{ github.event.workflow_run.head_sha || github.sha }})..."
          ( cd services/embedding-modal && uv run modal deploy main.py )
          echo "✓ Embedding Modal app deployed"

      - name: Deploy model Modal app
        if: >-
          steps.modal_auth.outputs.authenticated == 'true' &&
          (
            github.event_name == 'workflow_run' ||
            github.event.inputs.deploy_model == 'true'
          )
        env:
          MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}
          MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT || secrets.MODAL_ENVIRONMENT || '' }}
        run: |
          echo "Deploying vecinita-model..."
          ( cd services/model-modal && uv run modal deploy main.py )
          echo "✓ Model Modal app deployed"

      - name: Deploy scraper Modal apps
        if: >-
          steps.modal_auth.outputs.authenticated == 'true' &&
          (
            github.event_name == 'workflow_run' ||
            github.event.inputs.deploy_scraper == 'true'
          )
        env:
          MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}
          MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT || secrets.MODAL_ENVIRONMENT || '' }}
        run: |
          echo "Deploying vecinita-scraper workers + API..."
          ( cd services/scraper && uv run modal deploy modal_workers_entry.py )
          ( cd services/scraper && uv run modal deploy modal_api_entry.py )
          echo "✓ Scraper Modal apps deployed"

      - name: Verify deployments
        if: steps.modal_auth.outputs.authenticated == 'true'
        env:
          MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}
          MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT || secrets.MODAL_ENVIRONMENT || '' }}
        run: |
          echo "Recent Modal apps (if permitted):"
          MODAL_PROFILE="${MODAL_PROFILE:-vecinita}" modal app list --all 2>/dev/null || true

      - name: Modal deploy skipped (no credentials)
        if: steps.modal_auth.outputs.authenticated != 'true'
        run: echo "Modal deploy skipped; workflow stays green until tokens are configured."

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: modal-deploy
    if: always()

    steps:
      - name: Success
        if: needs.modal-deploy.result == 'success'
        run: |
          echo "Modal deployment workflow finished successfully."
          echo "Embedding/model on Modal are function-only; gateway should use MODAL_FUNCTION_INVOCATION + MODAL_TOKEN_*."

      - name: Failure
        if: needs.modal-deploy.result == 'failure'
        run: |
          echo "Modal deployment workflow failed."
          exit 1
