# nginx-modal-proxy.conf
#
# Local stub for vecinita-modal-proxy-v1.
# Routes sub-paths to the correct backend service, mirroring the production
# Modal proxy routing so local integration tests exercise the same URL paths.

server {
    listen 10000;
    server_name _;

    # -----------------------------------------------------------------------
    # Health endpoint — returns 200 so healthchecks pass
    # -----------------------------------------------------------------------
    location = /health {
        return 200 '{"status":"ok","proxy":"modal-proxy-local-stub"}';
        add_header Content-Type application/json;
    }

    # -----------------------------------------------------------------------
    # /model/* → model service (strips /model prefix before forwarding)
    # -----------------------------------------------------------------------
    location /model/ {
        proxy_pass         http://vecinita-model-ms-render:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # /model (without trailing slash) — redirect to /model/
    location = /model {
        return 301 /model/;
    }

    # -----------------------------------------------------------------------
    # /embedding/* → embedding service (strips /embedding prefix)
    # -----------------------------------------------------------------------
    location /embedding/ {
        proxy_pass         http://vecinita-embedding-ms-render:8011/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /embedding {
        return 301 /embedding/;
    }

    # -----------------------------------------------------------------------
    # /jobs/* → scraper service (strips /jobs prefix)
    # -----------------------------------------------------------------------
    location /jobs/ {
        # Scraper service may not be running in all local setups; return 503
        # with a message rather than a connection refused so tests can detect
        # the failure path clearly.
        return 503 '{"error":"scraper service not configured in local stub"}';
        add_header Content-Type application/json;
    }

    # -----------------------------------------------------------------------
    # Catch-all — return 404
    # -----------------------------------------------------------------------
    location / {
        return 404 '{"error":"unknown proxy path"}';
        add_header Content-Type application/json;
    }
}
