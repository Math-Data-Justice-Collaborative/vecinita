services:
  - type: web
    name: vecinita-agent
    runtime: docker
    region: virginia
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: EMBEDDING_SERVICE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: MODAL_EMBEDDING_ENDPOINT
        sync: false
      - key: MODAL_OLLAMA_ENDPOINT
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_API_PROXY_KEY
        sync: false
      - key: MODAL_API_PROXY_SECRET
        sync: false
      - key: PROXY_AUTH_TOKEN
        sync: false
      - key: MODAL_PROXY_AUTH_TOKEN
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: REINDEX_SERVICE_URL
        sync: false
      - key: REINDEX_TRIGGER_TOKEN
        sync: false
      - key: EMBEDDING_STRICT_STARTUP
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false

  - type: web
    name: vecinita-frontend
    runtime: docker
    region: virginia
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: VITE_GATEWAY_URL
        value: "https://vecinita-gateway.onrender.com/api/v1"
      - key: VITE_BACKEND_URL
        value: "https://vecinita-agent.onrender.com"
      - key: VITE_AGENT_REQUEST_TIMEOUT_MS
        value: "90000"
      - key: VITE_AGENT_STREAM_TIMEOUT_MS
        value: "120000"
      - key: VITE_AGENT_STREAM_FIRST_EVENT_TIMEOUT_MS
        value: "15000"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: vecinita-gateway
    runtime: docker
    region: virginia
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: sh -c 'uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Allow Render-hosted frontend and all onrender.com subdomains.
      # Override ALLOWED_ORIGINS with a comma-separated list for custom domains.
      - key: ALLOWED_ORIGINS
        value: "https://vecinita-frontend.onrender.com"
      - key: ALLOWED_ORIGIN_REGEX
        value: "^https://[a-z0-9-]+\\.onrender\\.com$"
      - key: AGENT_TIMEOUT
        value: "75"
      - key: AGENT_STREAM_TIMEOUT
        value: "120"
      - key: AGENT_SERVICE_URL
        fromService:
          name: vecinita-agent
          type: web
          property: hostport
      - key: EMBEDDING_SERVICE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: MODAL_EMBEDDING_ENDPOINT
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_API_PROXY_KEY
        sync: false
      - key: MODAL_API_PROXY_SECRET
        sync: false
      - key: PROXY_AUTH_TOKEN
        sync: false
      - key: MODAL_PROXY_AUTH_TOKEN
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEV_ADMIN_ENABLED
        value: "true"
      - key: DEV_ADMIN_BEARER_TOKEN
        sync: false
      - key: SUPABASE_UPLOADS_BUCKET
        value: "documents"

databases:
  - name: vecinita-postgres
    region: virginia
    plan: basic-256mb
    databaseName: vecinita
    user: vecinita
    postgresMajorVersion: "16"
    diskSizeGB: 1
    ipAllowList: []
