    - name: Install model-modal dependencies
      working-directory: services/model-modal
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Lint model-modal
      working-directory: services/model-modal
      run: make lint

  model-modal-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install model-modal dependencies
      working-directory: services/model-modal
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Run model-modal tests
      working-directory: services/model-modal
      run: make test

  scraper-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install scraper dependencies
      working-directory: services/scraper
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Lint scraper
      working-directory: services/scraper
      run: make lint

    - name: Check scraper formatting
      working-directory: services/scraper
      run: black --check src/ tests/

    - name: Type check scraper
      working-directory: services/scraper
      run: make type-check

  scraper-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install scraper dependencies
      working-directory: services/scraper
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Run scraper tests
      working-directory: services/scraper
      run: make test

  backend-ci:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        docker system prune -af || true

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    # Skip Playwright browser install for non-UI tests to save space
    - name: Skip Playwright browsers (no UI tests)
      run: echo "Playwright browser install skipped in CI"

    - name: Create .env file for tests
      working-directory: backend
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY || 'test-key' }}" >> .env
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "OLLAMA_MODEL=llama3.1:8b" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "EMBEDDING_STRICT_STARTUP=false" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env
      shell: bash

    - name: Run backend tests (unit only)
      working-directory: backend
      run: |
        pytest tests/ -m "unit and not llm" -v --tb=short --junit-xml=test-results.xml \
          --cov=src.embedding_service.modal_app \
          --cov=src.services.embedding.models \
          --cov=src.utils.supabase_embeddings \
          --cov=src.utils.tags \
          --cov-config=.coveragerc.unit --cov-report=xml --cov-report=html --cov-report=term \
          --cov-fail-under=98
      env:
        PYTHONPATH: ${{ github.workspace }}/backend
        SKIP_AGENT_MAIN_IMPORT: 'true'
        EMBEDDING_STRICT_STARTUP: 'false'

    - name: API regression - ask config returns JSON
      working-directory: backend
      run: |
        pytest tests/test_api/test_gateway_router_ask.py -k "get_ask_config_success" -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}/backend
        EMBEDDING_STRICT_STARTUP: 'false'

  backend-integration:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
