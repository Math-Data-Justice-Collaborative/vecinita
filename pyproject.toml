[project]
name = "vecinita"
version = "0.1.0"
description = "Vecinita RAG Q&A Assistant with LangGraph"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Vecinita Team"}
]
keywords = ["rag", "langgraph>=0.2.0", "langchain", "supabase", "fastapi", "ai", "assistant"]

dependencies = [
    # Web Framework
    "fastapi==0.109.0",
    "uvicorn==0.27.0",
    # LangChain & LangGraph - Updated for Gemini/OpenAI compatibility
    "langchain>=0.2.0",
    "langchain-community>=0.2.0",
    "langchain-core>=0.2.0",
    "langchain-openai>=0.1.0",
    "langchain-google-genai>=1.0.10", # Added directly to source of truth
    "langchain-groq>=0.1.0",
    "langchain-text-splitters",
    "langchain-huggingface",
    "langgraph>=0.2.0",
    # Database & Utilities
    "supabase==2.5.0",
    "psycopg2-binary==2.9.9",
    "python-dotenv",
    "langdetect",
    "playwright",
    # ML & Embeddings
    "fastembed",
    # Document Processing
    "beautifulsoup4",
    "pypdf",
    "unstructured",
    "playwright",
    # Utilities
    "python-dotenv",
    "pydantic",
    "requests",
    "httpx",
    "langdetect",
    "tqdm",
    "gotrue>=2.0.0",
    "langchain-ollama>=1.0.0",
    "docker>=7.0.0",
    "langsmith>=0.4.56",
    # Platform-specific pins for stability
    "onnxruntime>=1.18.0,<1.24.0.dev; sys_platform == 'win32'",
    "tokenizers>=0.15.0,<0.22.0rc",
]

[project.optional-dependencies]
embedding = [
    "sentence-transformers>=5.1.2",
]
ml = [
    "tf-keras>=2.20.1",
]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "httpx",
    "fastapi",
    "black",
    "ruff",
    "mypy",
    "jupyter",
    "ipython",
]
ci = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "httpx",
]
visualization = [
    "graphviz",
    "pygraphviz",
]
all = [
    "vecinita[dev,visualization,embedding]",
]

[project.scripts]
vecinita-main = "src.main:main"
vecinita-agent = "src.rag_agent:main"
vecinita-setup = "src.setup_check:main"
vecinita-example = "scripts.example_rag_usage:main"
vecinita-fastapi = "scripts.fastapi_integration_example:main"
vecinita-scrape = "src.scraper.cli:main"

[project.urls]
Homepage = "https://github.com/acadiagit/vecinita"
Repository = "https://github.com/acadiagit/vecinita"
Issues = "https://github.com/acadiagit/vecinita/issues"

[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short", "--strict-markers", "--disable-warnings"]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "ui: UI/API tests",
    "slow: Slow tests",
    "api: API endpoint tests",
    "db: Database tests",
]
log_cli = false
log_cli_level = "INFO"
log_file = "tests/pytest.log"
log_file_level = "DEBUG"
console_output_style = "progress"
filterwarnings = [
    "ignore::pydantic.warnings.PydanticDeprecatedSince20",
    "ignore::DeprecationWarning:supabase._sync.client",
    "ignore::DeprecationWarning:importlib._bootstrap",
]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "W", "F", "I", "C", "B", "UP"]
ignore = ["E501", "B008", "C901"]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "supabase.*", "langchain.*", "langchain_community.*", 
    "langchain_core.*", "langchain_openai.*", "langchain_groq.*", 
    "langchain_huggingface.*", "langgraph.*", "sentence_transformers.*", 
    "fastembed.*", "unstructured.*", "playwright.*"
]
ignore_missing_imports = true
