name: Backend Coverage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-coverage.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-coverage.yml'
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    - name: Create .env file for tests
      working-directory: backend
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY || 'test-key' }}" >> .env
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "OLLAMA_MODEL=llama3.1:8b" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "EMBEDDING_STRICT_STARTUP=false" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env

    - name: Run backend unit tests with coverage
      working-directory: backend
      env:
        PYTHONPATH: ${{ github.workspace }}/backend
        SKIP_AGENT_MAIN_IMPORT: 'true'
        EMBEDDING_STRICT_STARTUP: 'false'
      run: |
        pytest tests/ -m "unit and not llm" -v --tb=short \
          --cov=src.embedding_service.modal_app \
          --cov=src.services.embedding.models \
          --cov=src.utils.supabase_embeddings \
          --cov=src.utils.tags \
          --cov-config=.coveragerc.unit --cov-report=xml --cov-report=term --junit-xml=test-results.xml \
          --cov-fail-under=98

    - name: Summarize coverage
      working-directory: backend
      run: |
        python - <<'PY'
        import xml.etree.ElementTree as ET

        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        line_rate = float(root.attrib.get('line-rate', 0.0)) * 100
        print(f"Backend line coverage: {line_rate:.2f}%")
        with open('coverage-summary.txt', 'w', encoding='utf-8') as f:
            f.write(f"Backend line coverage: {line_rate:.2f}%\n")
        PY

