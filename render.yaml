services:
  - type: web
    name: vecinita-agent
    runtime: docker
    region: virginia
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: MODAL_EMBEDDING_ENDPOINT
        sync: false
      - key: MODAL_OLLAMA_ENDPOINT
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: REINDEX_SERVICE_URL
        sync: false
      - key: REINDEX_TRIGGER_TOKEN
        sync: false
      - key: EMBEDDING_STRICT_STARTUP
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false

  - type: web
    name: vecinita-frontend
    runtime: docker
    region: virginia
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: VITE_GATEWAY_URL
        value: "https://vecinita-agent.onrender.com/api/v1"
      - key: VITE_BACKEND_URL
        value: "https://vecinita-agent.onrender.com"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

databases:
  - name: vecinita-postgres
    region: virginia
    plan: basic-256mb
    databaseName: vecinita
    user: vecinita
    postgresMajorVersion: "16"
    diskSizeGB: 1
    ipAllowList: []
