name: CI - Data Management Frontend
on:
  push:
    branches: [main]
    paths: ['apps/data-management-frontend/**']
  pull_request:
    paths: ['apps/data-management-frontend/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd apps/data-management-frontend && npm ci
      - run: cd apps/data-management-frontend && npm run lint
      - run: cd apps/data-management-frontend && npm test -- --run
