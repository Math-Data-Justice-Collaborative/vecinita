# Vecinita gitleaks configuration (QA-005).
#
# PR / CI: scan the current working tree only (no git history):
#   gitleaks detect --no-git --config .gitleaks.toml
#
# Full history (local ops / audit): expect ~54 advisory hits in deleted pre-Vecinita
# paths unless allowlisted below. Do not fail release gates on history-only findings.
#
# See docs/security/gitleaks-resolution.md

title = "Vecinita gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Deleted legacy monolith paths + gitignored local runtime secrets (QA-005)"
paths = [
  # Gitignored local secret stores (never commit; see .gitignore + no-operator-spec-commits rule)
  '''(?:^|/)\.deploy-keys\.local$''',
  '''(?:^|/)prod\.env$''',
  '''(?:^|/)\.tmp(?:/.*)?$''',
  '''(?:^|/)(?:admin-fe-spec|internal-write-api-spec|chat-rag-spec)\.yaml$''',
  # Removed backend / scraper-worker tree
  '''(?:^|/)backend(?:/.*)?$''',
  '''(?:^|/)apps/scraper-worker(?:/.*)?$''',
  # Legacy root-level deployment docs (not in current tree)
  '''(?:^|/)(?:DATA_MANAGEMENT_SETUP_COMPLETE|DEPLOYMENT_IMPLEMENTATION|DEPLOYMENT_QUICK_START|DEPLOY_DATA_MANAGEMENT_API|ENV_VARIABLES_REFERENCE|QUICKSTART_DATA_MANAGEMENT_API)\.md$''',
  # Legacy docs/ subtrees
  '''(?:^|/)docs/guides(?:/.*)?$''',
  '''(?:^|/)docs/reference(?:/.*)?$''',
  '''(?:^|/)docs/deployment(?:/.*)?$''',
  '''(?:^|/)docs/reports(?:/.*)?$''',
  # Render LLM context files removed from .github/
  '''(?:^|/)\.github/(?:llm-txt/)?render-llm\.txt$''',
  # Frontend build output (gitignored; may exist locally for Playwright preview)
  '''(?:^|/)apps/[^/]+-frontend/dist(?:/.*)?$''',
  # Playwright build script embeds the public Supabase demo anon JWT (not a production secret)
  '''(?:^|/)scripts/ui/build_for_playwright\.sh$''',
  # Session QA reports may quote allowlisted localStorage key names for traceability
  '''(?:^|/)docs/sessions/[^/]+/reports/qa-report\.md$''',
]

# Non-secret identifiers and well-known demo tokens (QA-S007-001)
regexes = [
  '''vecinita\.eval\.explore\.v1''',
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1v''',
]
