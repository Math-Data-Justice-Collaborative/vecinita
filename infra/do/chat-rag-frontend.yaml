# DigitalOcean App Platform — ChatRAG static site (F11)
name: vecinita-chat-rag-frontend
region: nyc

static_sites:
  - name: web
    github:
      repo: Math-Data-Justice-Collaborative/vecinita
      branch: main
      # Disabled: deploys are gated on CI via .github/workflows/deploy-digitalocean.yml
      # (push-webhook deploys bypass CI). Re-enable only if dropping the CD workflow.
      deploy_on_push: false
    source_dir: apps/chat-rag-frontend
    build_command: HUSKY=0 npm ci && npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: VITE_VECINITA_CHAT_API_URL
        scope: BUILD_TIME
        type: SECRET
