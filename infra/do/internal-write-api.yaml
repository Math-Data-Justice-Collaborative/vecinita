# DigitalOcean App Platform — internal write API (ADR-007, sole DATABASE_URL for Modal)
name: vecinita-internal-write-api
region: nyc
features:
  - buildpack-stack=ubuntu-22

services:
  - name: api
    github:
      repo: Math-Data-Justice-Collaborative/vecinita
      branch: main
      # Disabled: deploys are gated on CI via .github/workflows/deploy-digitalocean.yml
      # (push-webhook deploys bypass CI). Re-enable only if dropping the CD workflow.
      deploy_on_push: false
    source_dir: /
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    health_check:
      http_path: /health
    build_command: uv sync --group dev
    run_command: python3 -m uvicorn vecinita_internal_write_api.app:create_app --factory --host 0.0.0.0 --port 8080
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_INTERNAL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_ENV
        scope: RUN_TIME
        value: staging
      - key: VECINITA_CORS_ORIGINS
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_MODAL_DATA_MGMT_URL
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_MODAL_PROXY_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_MODAL_EMBED_URL
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_MODAL_LLM_URL
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_CHAT_RAG_URL
        scope: RUN_TIME
        value: https://vecinita-chat-rag-backend-jvqso.ondigitalocean.app
      - key: VECINITA_CHAT_FRONTEND_URL
        scope: RUN_TIME
        value: https://vecinita-chat-rag-frontend-jnt8o.ondigitalocean.app
      - key: VECINITA_ADMIN_FRONTEND_URL
        scope: RUN_TIME
        value: https://vecinita-admin-frontend-ef4ob.ondigitalocean.app
      - key: VECINITA_HEALTH_TIMEOUT_MS
        scope: RUN_TIME
        value: "5000"
      - key: VECINITA_AUDIT_RETENTION_DAYS
        scope: RUN_TIME
        value: "365"
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: VECINITA_AUTH_REQUIRED
        scope: RUN_TIME
        value: "true"
