name: Render Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "backend/**"
      - "frontend/**"
      - "apps/data-management-frontend/**"
      - "services/data-management-api/apps/backend/scraper-service/**"
      - "services/scraper/**"
      - "render.yaml"
      - "render.staging.yaml"
      - ".github/workflows/render-deploy.yml"
      - ".github/workflows/render-post-deploy.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "apps/data-management-frontend/**"
      - "services/data-management-api/apps/backend/scraper-service/**"
      - "services/scraper/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"
      - ".github/workflows/render-post-deploy.yml"
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout contract test submodules
        run: git submodule update --init --depth 1 services/embedding-modal services/model-modal

      - name: Validate production Render env contract
        run: python3 scripts/github/validate_render_env.py .env.prod.render

      - name: Validate staging Render env contract
        run: python3 scripts/github/validate_render_env.py .env.staging.render

      - name: Validate Render env key parity (prod vs staging)
        run: python3 scripts/github/validate_render_env_parity.py .env.prod.render .env.staging.render

      - name: Validate gateway dependency profile
        run: python3 scripts/github/validate_gateway_dependency_profile.py

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend CI dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Lint backend (Ruff)
        working-directory: backend
        run: python -m ruff check src tests

      - name: Check backend formatting (Black)
        working-directory: backend
        run: python -m black --check src tests

      - name: Type check backend (mypy)
        working-directory: backend
        run: python -m mypy src

      - name: Run backend fast tests (non-LLM)
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          EMBEDDING_STRICT_STARTUP: 'false'
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://test
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=llama3.1:8b
          USE_LOCAL_EMBEDDINGS=true
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
          EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token
          EMBEDDING_STRICT_STARTUP=false
          REINDEX_TRIGGER_TOKEN=test-reindex-token
          REINDEX_SERVICE_URL=https://example.modal.run
          EOF
          pytest tests/ -m "not integration and not e2e and not llm" -v --tb=short --junit-xml=test-results.xml

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout frontend submodule
        run: git submodule update --init --depth 1 frontend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint -- --quiet

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage:unit

  deploy-staging:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: staging
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_STAGING_GATEWAY_SERVICE_ID: ${{ secrets.RENDER_STAGING_GATEWAY_SERVICE_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Validate staging gateway runtime is Docker
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_STAGING_GATEWAY_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY or RENDER_STAGING_GATEWAY_SERVICE_ID missing; skipping staging runtime validation"
            exit 0
          fi
          python3 scripts/github/validate_render_runtime.py \
            --service-id "$RENDER_STAGING_GATEWAY_SERVICE_ID" \
            --service-name "vecinita-gateway-staging" \
            --expect docker

      - name: Staging deploy is Render-driven
        run: |
          echo "::notice::Staging services use blueprint autoDeployTrigger: checksPass — Render deploys after GitHub checks pass on the linked branch."
          echo "::notice::Deploy hooks are not invoked from this workflow (avoids double-deploy with Render). See docs/deployment/RENDER_STAGING_PROD_CICD.md"

  smoke-staging:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    needs: [deploy-staging]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_STAGING_FRONTEND_URL || vars.RENDER_STAGING_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_STAGING_AGENT_URL || vars.RENDER_STAGING_AGENT_URL }}
      GATEWAY_URL: ${{ secrets.RENDER_STAGING_GATEWAY_URL || vars.RENDER_STAGING_GATEWAY_URL }}
      DATA_MANAGEMENT_FRONTEND_URL: ${{ secrets.RENDER_STAGING_DATA_MANAGEMENT_FRONTEND_URL || vars.RENDER_STAGING_DATA_MANAGEMENT_FRONTEND_URL }}
      DATA_MANAGEMENT_API_URL: ${{ secrets.RENDER_STAGING_DATA_MANAGEMENT_API_URL || vars.RENDER_STAGING_DATA_MANAGEMENT_API_URL }}
    steps:
      - name: Wait for staging services to stabilise
        run: sleep 45

      - name: Smoke staging services
        run: |
          missing=0
          for key in FRONTEND_URL AGENT_URL GATEWAY_URL; do
            if [ -z "${!key}" ]; then
              echo "::notice::Staging smoke URL unset: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::warning::Skipping staging smoke tests — configure RENDER_STAGING_*_URL Secrets or Variables (see docs/deployment/RENDER_STAGING_PROD_CICD.md)."
            exit 0
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_agent_health_payload() {
            local url="$1"
            echo "[probe] Agent dependency health $url"
            payload=$(curl -fsS --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            JSON_PAYLOAD="$payload" python3 - <<'PY'
            import json
            import os

            payload = json.loads(os.environ["JSON_PAYLOAD"])
            status = payload.get("status")
            readiness = payload.get("readiness")
            if status != "ok":
              raise SystemExit(f"Agent status is not ok: {status}")
            if readiness == "degraded":
              raise SystemExit(f"Agent readiness degraded: {payload}")
            print(f"[result] Agent health status={status} readiness={readiness}")
            PY
          }

          check_gateway_health_payload() {
            local base_url="$1"
            local primary_url="${base_url%/}/api/v1/health"
            local fallback_url="${base_url%/}/health"
            local payload
            local status

            echo "[probe] Gateway dependency health $primary_url"
            status=$(curl -o /tmp/gateway-health.json -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$primary_url")

            if [ "$status" = "404" ]; then
              echo "[info] Gateway /api/v1/health not found, falling back to /health"
              status=$(curl -o /tmp/gateway-health.json -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$fallback_url")
            fi

            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] Gateway health probe failed with HTTP $status"
              exit 1
            fi

            payload=$(cat /tmp/gateway-health.json)
            JSON_PAYLOAD="$payload" python3 - <<'PY'
            import json
            import os

            payload = json.loads(os.environ["JSON_PAYLOAD"])
            status = payload.get("status")
            agent = payload.get("agent_service")
            embedding = payload.get("embedding_service")
            if status != "ok":
                raise SystemExit(f"Gateway status is not ok: {status}")
            if agent != "ok" or embedding != "ok":
                raise SystemExit(f"Gateway dependencies unhealthy: agent={agent}, embedding={embedding}, payload={payload}")
            print(f"[result] Gateway status={status} agent={agent} embedding={embedding}")
            PY
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_agent_health_payload "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_gateway_health_payload "$GATEWAY_URL"
          check_url "Gateway documents tags" "$GATEWAY_URL/api/v1/documents/tags?limit=5"
          check_url "Data management frontend health" "$DATA_MANAGEMENT_FRONTEND_URL/"
          check_url "Data management API health" "$DATA_MANAGEMENT_API_URL/health"

  deploy-production:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: production
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_GATEWAY_SERVICE_ID: ${{ secrets.RENDER_GATEWAY_SERVICE_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Validate production gateway runtime is Docker
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_GATEWAY_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY or RENDER_GATEWAY_SERVICE_ID missing; skipping production runtime validation"
            exit 0
          fi
          python3 scripts/github/validate_render_runtime.py \
            --service-id "$RENDER_GATEWAY_SERVICE_ID" \
            --service-name "production gateway" \
            --expect docker

      - name: Production deploy is Render-driven
        run: |
          echo "::notice::Production services use blueprint autoDeployTrigger: checksPass — Render starts deploys after all GitHub checks pass (https://render.com/docs/deploys#integrating-with-ci)."
          echo "::notice::This workflow does not POST deploy hooks (avoids double-deploy). Sync render.yaml to Render and confirm Auto-Deploy shows After CI Checks Pass."
          echo "::notice::Deploy wait + production smoke run in workflow render-post-deploy.yml after this workflow completes (avoids checksPass deadlock)."
