services:
  chroma:
    image: chromadb/chroma:latest
    container_name: vecinita-chroma-ms
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/data"
    ports:
      - "8102:8000"
    volumes:
      - chroma_data_ms:/data
    networks:
      - vecinita-ms-net

  postgres:
    image: postgres:16-alpine
    container_name: vecinita-postgres-ms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "8543:5432"
    volumes:
      - postgres_data_ms:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vecinita-ms-net

  postgrest:
    image: postgrest/postgrest:v12.0.1
    container_name: vecinita-postgrest-ms
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@vecinita-postgres-ms:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: dev-jwt-secret-for-local-testing-only-32chars-min
    ports:
      - "8301:3000"
    networks:
      - vecinita-ms-net

  ollama:
    image: ollama/ollama:latest
    container_name: vecinita-ollama-ms
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_ms:/root/.ollama
    networks:
      - vecinita-ms-net

  model-service:
    build:
      context: ./services/model-modal
      dockerfile: Dockerfile
    container_name: vecinita-model-ms
    environment:
      OLLAMA_HOST: http://vecinita-ollama-ms:11434
      DEFAULT_MODEL: llama3.2
    ports:
      - "8008:8000"
    depends_on:
      - ollama
    networks:
      - vecinita-ms-net

  embedding-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.embedding-modal
    container_name: vecinita-embedding-ms
    ports:
      - "8011:8011"
    networks:
      - vecinita-ms-net

  scraper-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.scraper-service
    container_name: vecinita-scraper-ms
    environment:
      MODAL_PROXY_AUTH_ENABLED: "false"
      SUPABASE_PROJECT_URL: http://vecinita-postgrest-ms:3000
      SUPABASE_ANON_KEY: dev-anon-key
      SUPABASE_SERVICE_KEY: dev-service-key
      VECINITA_EMBEDDING_API_URL: http://vecinita-embedding-ms:8011
    ports:
      - "8020:8020"
    depends_on:
      postgrest:
        condition: service_started
      embedding-service:
        condition: service_started
    networks:
      - vecinita-ms-net

  modal-proxy:
    build:
      context: ./services/modal-proxy
      dockerfile: Dockerfile
    container_name: vecinita-modal-proxy-ms
    environment:
      PORT: 10000
      MODAL_TOKEN_ID: "${MODAL_TOKEN_ID:-${MODAL_API_PROXY_KEY:-${MODAL_API_TOKEN_ID:-${MODAL_AUTH_KEY:-local-modal-token-id}}}}"
      MODAL_TOKEN_SECRET: "${MODAL_TOKEN_SECRET:-${MODAL_API_PROXY_SECRET:-${MODAL_API_TOKEN_SECRET:-${MODAL_AUTH_SECRET:-local-modal-token-secret}}}}"
      PROXY_AUTH_TOKEN: "${PROXY_AUTH_TOKEN:-vecinita-local-proxy-token}"
      VECINITA_SCRAPER_API_URL: "${VECINITA_SCRAPER_API_URL:-http://vecinita-scraper-ms:8020}"
      VECINITA_MODEL_API_URL: "${VECINITA_MODEL_API_URL:-http://vecinita-model-ms:8000}"
      VECINITA_EMBEDDING_API_URL: "${VECINITA_EMBEDDING_API_URL:-http://vecinita-embedding-ms:8011}"
      CORS_ORIGINS: "*"
      ENVIRONMENT: development
    ports:
      - "10000:10000"
    depends_on:
      - scraper-service
      - model-service
      - embedding-service
    networks:
      - vecinita-ms-net

  chat-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-chat-agent-ms
    command: ["sh", "-c", "uvicorn src.agent.main:app --host 0.0.0.0 --port 8000"]
    environment:
      PORT: 8000
      OLLAMA_BASE_URL: http://vecinita-modal-proxy-ms:10000/model
      EMBEDDING_SERVICE_URL: http://vecinita-modal-proxy-ms:10000/embedding
      MODAL_API_PROXY_SECRET: vecinita-local-proxy-token
      SUPABASE_URL: http://vecinita-postgrest-ms:3000
      SUPABASE_KEY: dev-anon-key
      DATABASE_URL: postgresql://postgres:postgres@vecinita-postgres-ms:5432/postgres
      CHROMA_HOST: vecinita-chroma-ms
      CHROMA_PORT: 8000
      CHROMA_SSL: "false"
      DEFAULT_PROVIDER: ollama
      OLLAMA_MODEL: llama3.2
      EMBEDDING_STRICT_STARTUP: "false"
    ports:
      - "8000:8000"
    depends_on:
      - modal-proxy
      - chroma
      - postgrest
    networks:
      - vecinita-ms-net

  chat-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-chat-gateway-ms
    command: ["sh", "-c", "uvicorn src.api.main:app --host 0.0.0.0 --port 8004"]
    environment:
      PORT: 8004
      AGENT_SERVICE_URL: http://vecinita-chat-agent-ms:8000
      EMBEDDING_SERVICE_URL: http://vecinita-modal-proxy-ms:10000/embedding
      MODAL_API_PROXY_SECRET: vecinita-local-proxy-token
      CHROMA_HOST: vecinita-chroma-ms
      CHROMA_PORT: 8000
      CHROMA_SSL: "false"
      SUPABASE_URL: http://vecinita-postgrest-ms:3000
      SUPABASE_KEY: dev-anon-key
      DEV_ADMIN_ENABLED: "true"
      DEV_ADMIN_BEARER_TOKEN: vecinita-dev-admin-token-2026
      SUPABASE_UPLOADS_BUCKET: documents
      REINDEX_SERVICE_URL: http://vecinita-modal-proxy-ms:10000/jobs
      REINDEX_TRIGGER_TOKEN: vecinita-local-proxy-token
    ports:
      - "8004:8004"
    depends_on:
      - chat-agent
    networks:
      - vecinita-ms-net

  chat-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: http://localhost:8004/api/v1
        VITE_BACKEND_URL: http://localhost:8000
    container_name: vecinita-chat-frontend-ms
    ports:
      - "5173:5173"
    depends_on:
      - chat-gateway
    networks:
      - vecinita-ms-net

  data-manager-frontend:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.data-management-frontend
    container_name: vecinita-data-manager-frontend-ms
    ports:
      - "4173:4173"
    depends_on:
      - modal-proxy
    networks:
      - vecinita-ms-net

volumes:
  postgres_data_ms:
  chroma_data_ms:
  ollama_data_ms:

networks:
  vecinita-ms-net:
    driver: bridge
