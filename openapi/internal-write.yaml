openapi: 3.0.3
info:
  title: Vecinita DO Internal Write API
  version: 0.4.0
  description: Service-to-service writes from Modal workers (sole DATABASE_URL holder).
servers:
  - url: /internal/v1
    description: Internal write API (DigitalOcean)
paths:
  /documents/batch:
    post:
      operationId: upsertDocumentsBatch
      summary: Upsert documents, chunks, and embeddings
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpsertRequest"
      responses:
        "200":
          description: Upsert counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpsertResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents:
    get:
      operationId: listDocuments
      summary: List corpus documents
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}:
    delete:
      operationId: deleteDocument
      summary: Delete document and dependent chunks/embeddings
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}/chunks:
    get:
      operationId: listDocumentChunks
      summary: List chunks for admin viewer
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chunk list with tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChunkDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/{document_id}/tags:
    patch:
      operationId: patchDocumentTags
      summary: Replace document tags (human or llm batch)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPatchRequest"
      responses:
        "200":
          description: Updated tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/{document_id}/retag:
    post:
      operationId: retagDocumentLlm
      summary: Re-run LLM tagging for a document
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated tags from LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /chunks/{chunk_id}/tags:
    patch:
      operationId: patchChunkTags
      summary: Replace chunk-level tags
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: chunk_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPatchRequest"
      responses:
        "200":
          description: Updated chunk tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /documents/bulk:
    delete:
      operationId: bulkDeleteDocuments
      summary: Bulk delete documents (EV-002 F27)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/tags:
    patch:
      operationId: bulkTagDocuments
      summary: Bulk add/remove tags (EV-002 F27)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkTagRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/retag:
    post:
      operationId: bulkRetagDocuments
      summary: Bulk LLM retag (EV-002 F27)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteRequest"
      responses:
        "202":
          description: Retag jobs enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRetagResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/bulk/metadata:
    patch:
      operationId: bulkUpdateMetadata
      summary: Bulk update document metadata (EV-002 F27)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMetadataRequest"
      responses:
        "200":
          description: Partial success result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /documents/{document_id}/history:
    get:
      operationId: getDocumentHistory
      summary: Per-document audit history (EV-002 F29)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document history events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /audit:
    get:
      operationId: getAuditLog
      summary: Query audit log with filters (EV-002 F29)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: event_type
          in: query
          schema:
            type: string
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: actor_id
          in: query
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/served:
    post:
      operationId: recordStatsServed
      summary: Increment serving counters (EV-002 F28)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatsServedRequest"
      responses:
        "202":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsServedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/top-served:
    get:
      operationId: getTopServed
      summary: Top served documents ranked (EV-002 F28)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Ranked list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopServedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/summary:
    get:
      operationId: getStatsSummary
      summary: Dashboard aggregate statistics (EV-002 F25)
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /health/all:
    get:
      operationId: getHealthAggregate
      summary: Aggregate health of all services (EV-002 F26)
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Service health grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthAggregateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /health:
    get:
      operationId: health
      summary: Service health
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /eval/runs:
    post:
      operationId: createEvalRun
      summary: Trigger golden-set or ad-hoc eval run with sandbox config (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRunCreateRequest"
      responses:
        "202":
          description: Eval run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunCreateResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listEvalRuns
      summary: List eval run history (EV-008 F36)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Eval run history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /eval/runs/timeseries:
    get:
      operationId: getEvalRunsTimeseries
      summary: Completed eval runs for dashboard charts (EV-008 F36 / EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Timeseries points for charting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalTimeseriesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /eval/runs/{run_id}:
    get:
      operationId: getEvalRun
      summary: Eval run detail with per-question drill-down (EV-008 F36)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Eval run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /eval/criteria:
    get:
      operationId: listEvalCriteria
      summary: List admin-defined eval judge criteria (EV-008 F36)
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Eval criteria list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalCriterionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createEvalCriterion
      summary: Create eval judge criterion (EV-008 F36)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalCriterionCreateRequest"
      responses:
        "201":
          description: Criterion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalCriterionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /eval/criteria/{criterion_id}:
    patch:
      operationId: updateEvalCriterion
      summary: Update eval judge criterion (EV-008 F36)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: criterion_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalCriterionUpdateRequest"
      responses:
        "200":
          description: Updated criterion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalCriterionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /eval/config-presets:
    get:
      operationId: listEvalConfigPresets
      summary: List per-user eval config presets (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Preset list for authenticated operator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalConfigPresetListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createEvalConfigPreset
      summary: Create eval config preset (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalConfigPresetCreateRequest"
      responses:
        "201":
          description: Preset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalConfigPresetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /eval/config-presets/{preset_id}:
    get:
      operationId: getEvalConfigPreset
      summary: Get eval config preset by id (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: preset_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Preset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalConfigPresetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEvalConfigPreset
      summary: Update eval config preset (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: preset_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalConfigPresetUpdateRequest"
      responses:
        "200":
          description: Preset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalConfigPresetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /eval/config-presets/{preset_id}/clone:
    post:
      operationId: cloneEvalConfigPreset
      summary: Clone shared eval config preset for current operator (EV-009 F37)
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: preset_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalConfigPresetCloneRequest"
      responses:
        "201":
          description: Cloned preset for requester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalConfigPresetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /models/ollama:
    get:
      operationId: listOllamaModels
      summary: List Ollama models on Modal vecinita-models volume (EV-010 F38)
      description: >
        Playground model picker. Requires operator JWT with role admin or super-admin.
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Model list with availability from volume manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OllamaModelListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /models/ollama/pull:
    post:
      operationId: pullOllamaModel
      summary: Enqueue Ollama model pull into Modal volume (EV-010 F38)
      description: >
        Super-admin only. Admin and viewer receive 403. Poll GET /models/ollama until
        model_id is available.
      security:
        - bearerAuth: []
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OllamaModelPullRequest"
      responses:
        "202":
          description: Background pull job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OllamaModelPullResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Modal Ollama upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "503":
          description: Ollama models client not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /models/ollama/catalog:
    get:
      operationId: listOllamaCatalogFamilies
      summary: List Ollama.com library model families (EV-010 F38 extension)
      description: >
        Super-admin only. Returns model family slugs from ollama.com/library for the
        download tree browser. Expand a family via GET /models/ollama/catalog/{slug}.
      security:
        - bearerAuth: []
        - internalApiKey: []
      responses:
        "200":
          description: Sorted model family slugs from the public Ollama library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OllamaModelCatalogFamiliesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Ollama library upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /models/ollama/catalog/{slug}:
    get:
      operationId: listOllamaCatalogFamilyTags
      summary: List tags for one Ollama library model family (EV-010 F38 extension)
      description: >
        Super-admin only. Returns all published tags (versions and quantizations) for
        one model family slug, with Modal volume availability overlaid.
      security:
        - bearerAuth: []
        - internalApiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: Tags for the requested model family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OllamaModelCatalogFamilyTagsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Ollama library upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token (operator JWT); write routes require role admin
    internalApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: VECINITA_INTERNAL_API_KEY
  schemas:
    EmbeddingVector:
      type: array
      minItems: 384
      maxItems: 384
      items:
        type: number
        format: float
    ChunkUpsert:
      type: object
      required:
        - chunk_index
        - text
        - embedding
      properties:
        chunk_index:
          type: integer
          minimum: 0
        text:
          type: string
        embedding:
          $ref: "#/components/schemas/EmbeddingVector"
    DocumentUpsert:
      type: object
      required:
        - url
        - chunks
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
          nullable: true
        content_hash:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        chunks:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChunkUpsert"
        tags:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/TagInput"
    TagInput:
      type: object
      required:
        - slug
        - label
      properties:
        slug:
          type: string
        label:
