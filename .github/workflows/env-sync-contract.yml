name: Env Sync Contract

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - "render.yaml"
      - "render.staging.yaml"
      - ".env.prod.render.example"
      - ".env.staging.render.example"
      - ".env.local.example"
      - ".github/workflows/**"
      - "scripts/env_sync.py"
      - "scripts/github/validate_render_env.py"
      - "scripts/github/validate_render_env_parity.py"
      - "apis/gateway/tests/contracts/test_env_sync_github_actions_bundle.py"
      - "services/**/config.py"
      - "services/**/shared_config/**"
      - "apis/gateway/src/utils/render_env_contract.py"
  pull_request:
    branches: [main, develop]
    paths:
      - "render.yaml"
      - "render.staging.yaml"
      - ".env.prod.render.example"
      - ".env.staging.render.example"
      - ".env.local.example"
      - ".github/workflows/**"
      - "scripts/env_sync.py"
      - "scripts/github/validate_render_env.py"
      - "scripts/github/validate_render_env_parity.py"
      - "apis/gateway/tests/contracts/test_env_sync_github_actions_bundle.py"
      - "services/**/config.py"
      - "services/**/shared_config/**"
      - "apis/gateway/src/utils/render_env_contract.py"
  workflow_dispatch:

jobs:
  env-sync-contract:
    name: Env Key Sync Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apis/gateway

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Sync dependencies
        # pytest + pact-python live in optional-dependencies.ci (not UV dependency-groups);
        # pytest imports tests/ during collection before marker filters.
        run: uv sync --frozen --extra ci

      - name: Run env sync contract tests
        env:
          SKIP_AGENT_MAIN_IMPORT: "true"
        run: uv run python -m pytest tests/contracts/test_env_sync_contract.py tests/contracts/test_env_sync_github_actions_bundle.py -v --tb=short -m contract
