name: Render Preview Attestation Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]

jobs:
  render-preview-attestation:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate Render preview title + live attestation
        env:
          EXPECTED_GIT_HEAD: ${{ github.event.pull_request.head.sha }}
          EXPECTED_PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          python3 scripts/ci/render_live_attestation_validate.py \
            --attestation .ci/render-live-attestation.json \
            --max-age-hours 24 \
            --expected-git-head "${EXPECTED_GIT_HEAD}" \
            --expected-pr-title "${EXPECTED_PR_TITLE}"
