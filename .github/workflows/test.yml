name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PACT_COVERAGE_THRESHOLD: "95"
  CONTRACT_COVERAGE_THRESHOLD: "95"
  INTEGRATION_COVERAGE_THRESHOLD: "90"
  SYSTEM_COVERAGE_THRESHOLD: "85"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-context:
    runs-on: ubuntu-22.04
    outputs:
      has_cross_repo_token: ${{ steps.detect.outputs.has_cross_repo_token }}
    steps:
    - name: Detect cross-repo token availability
      id: detect
      env:
        HAS_CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN != '' }}
      run: echo "has_cross_repo_token=${HAS_CROSS_REPO_TOKEN}" >> "$GITHUB_OUTPUT"

  corpus-sync-impacted-routing:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: 'false'

    - name: Compute impacted corpus-sync suites (skeleton)
      run: |
        python3 scripts/ci/impacted_corpus_test_suites.py --mode impacted --emit-json

    - name: Enforce corpus-sync suite threshold policy
      run: |
        test "${PACT_COVERAGE_THRESHOLD}" -ge 95
        test "${CONTRACT_COVERAGE_THRESHOLD}" -ge 95
        test "${INTEGRATION_COVERAGE_THRESHOLD}" -ge 90
        test "${SYSTEM_COVERAGE_THRESHOLD}" -ge 85

    - name: Contract drift synchronization gate
      run: |
        set -euo pipefail
        changed_files="$(git diff --name-only HEAD~1..HEAD || true)"
        if echo "$changed_files" | grep -E 'specs/.*/contracts/|openapi|apps/gateway/tests/pact|apps/data-management-api/tests/pact' >/dev/null; then
          python3 scripts/ci/impacted_corpus_test_suites.py --mode impacted --emit-json
        fi

  secret-scan:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: 'false'

    - name: Install gitleaks
      run: |
        set -euo pipefail
        version="8.24.2"
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz
        sudo install gitleaks /usr/local/bin/gitleaks

    - name: Run gitleaks
      run: |
        if ! gitleaks dir . --redact --config .gitleaks.toml; then
          echo "::warning::gitleaks found potential secrets. Review findings and tighten .gitleaks.toml allowlists as needed."
        fi

  backend-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout contract test submodules
      run: git submodule update --init --depth 1 apps/embedding-worker apps/vllm-inference

    - name: Install uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: |
          apps/gateway/uv.lock
          apps/gateway/pyproject.toml

    # [project.optional-dependencies].ci only (see TESTING_DOCUMENTATION.md: pact-python / pytest collection).
    - name: Install backend CI dependencies (locked; matches local uv)
      working-directory: apps/gateway
      run: uv sync --frozen --extra ci

    - name: Lint backend (Ruff)
      working-directory: apps/gateway
      run: uv run ruff check src tests

    - name: Check backend formatting (Black)
      working-directory: apps/gateway
      run: uv run black --check --config pyproject.toml src tests scripts ../../scripts/dm_openapi_diff.py

    - name: Type check backend (mypy)
      working-directory: apps/gateway
      run: uv run python -m mypy src

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout frontend submodule
      run: git submodule update --init --depth 1 apps/chat-frontend

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/chat-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: apps/chat-frontend
      run: npm ci

    - name: Lint frontend
      working-directory: apps/chat-frontend
      run: npm run lint

    - name: Check frontend formatting (Prettier)
      working-directory: apps/chat-frontend
      run: npm run format

    - name: Type check frontend
      working-directory: apps/chat-frontend
      run: npm run typecheck

  data-management-api-structure:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'
        token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

    - name: Checkout data-management API submodule
      run: git submodule update --init --depth 1 apps/data-management-api

    - name: Validate imported data-management repo structure
      run: |
        test -f apps/data-management-api/.gitmodules
        test -d apps/data-management-api/apps/backend
        test -d apps/data-management-api/apps/frontend

  data-management-frontend-quality:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'
        token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

    - name: Checkout data-management frontend submodule
      run: git submodule update --init --depth 1 apps/data-management-frontend

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/data-management-frontend/package-lock.json

    - name: Install data-management frontend dependencies
      working-directory: apps/data-management-frontend
      run: npm ci

    - name: Lint data-management frontend
      working-directory: apps/data-management-frontend
      run: npm run lint

    - name: Build data-management frontend
      working-directory: apps/data-management-frontend
      run: npm run build

  data-management-frontend-ci:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'
        token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

    - name: Checkout data-management frontend submodule
      run: git submodule update --init --depth 1 apps/data-management-frontend

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/data-management-frontend/package-lock.json

    - name: Install data-management frontend dependencies
      working-directory: apps/data-management-frontend
      run: npm ci

    - name: Run data-management frontend tests
      working-directory: apps/data-management-frontend
      run: npm run test

    - name: Pact consumer (DM → scraper / modal-jobs)
      working-directory: apps/data-management-frontend
      run: npm run test:pact

  embedding-modal-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout embedding-modal submodule
      run: git submodule update --init --depth 1 apps/embedding-worker

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install embedding-modal dependencies
      working-directory: apps/embedding-worker
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Lint embedding-modal
      working-directory: apps/embedding-worker
      run: make lint

  embedding-modal-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout embedding-modal submodule
      run: git submodule update --init --depth 1 apps/embedding-worker

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install embedding-modal dependencies
      working-directory: apps/embedding-worker
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Run embedding-modal tests
      working-directory: apps/embedding-worker
      run: make test

  model-modal-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout model-modal submodule
      run: git submodule update --init --depth 1 apps/vllm-inference

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install model-modal dependencies
      working-directory: apps/vllm-inference
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Lint model-modal
      working-directory: apps/vllm-inference
      run: make lint

  model-modal-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout model-modal submodule
      run: git submodule update --init --depth 1 apps/vllm-inference

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install model-modal dependencies
      working-directory: apps/vllm-inference
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Run model-modal tests
      working-directory: apps/vllm-inference
      run: make test

  scraper-quality:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'
        token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

    - name: Checkout scraper submodule
      run: git submodule update --init --depth 1 apps/scraper-worker

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install scraper dependencies
      working-directory: apps/scraper-worker
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Lint scraper
      working-directory: apps/scraper-worker
      run: make lint

    - name: Check scraper formatting
      working-directory: apps/scraper-worker
      run: black --check src/ tests/

    - name: Type check scraper
      working-directory: apps/scraper-worker
      run: make type-check

  scraper-ci:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'
        token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

    - name: Checkout scraper submodule
      run: git submodule update --init --depth 1 apps/scraper-worker

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install scraper dependencies
      working-directory: apps/scraper-worker
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Run scraper tests
      working-directory: apps/scraper-worker
      run: make test

  backend-ci:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout contract test submodules
      run: git submodule update --init --depth 1 apps/embedding-worker apps/vllm-inference

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        docker system prune -af || true

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: apps/gateway
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    # Skip Playwright browser install for non-UI tests to save space
    - name: Skip Playwright browsers (no UI tests)
      run: echo "Playwright browser install skipped in CI"

    - name: Create .env file for tests
      working-directory: apps/gateway
      run: |
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "OLLAMA_MODEL=gemma3" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "EMBEDDING_STRICT_STARTUP=false" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env
      shell: bash

    - name: Run backend fast tests
      working-directory: apps/gateway
      run: |
        pytest tests/ -m "not integration and not e2e and not llm" -v --tb=short --junit-xml=test-results.xml \
          --cov=vecinita.app \
          --cov=src.services.embedding.models \
          --cov=src.utils.tags \
          --cov-config=.coveragerc.unit --cov-report=xml --cov-report=html --cov-report=term \
          --cov-fail-under=98
      env:
        PYTHONPATH: ${{ github.workspace }}/apps/gateway:${{ github.workspace }}/apps/embedding-worker/src
        SKIP_AGENT_MAIN_IMPORT: 'true'
        EMBEDDING_STRICT_STARTUP: 'false'

    - name: API regression - ask config returns JSON
      working-directory: apps/gateway
      run: |
        pytest tests/test_api/test_gateway_router_ask.py -k "get_ask_config_success" -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}/apps/gateway
        EMBEDDING_STRICT_STARTUP: 'false'

  backend-integration:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout data-management API (corpus conflict tests import vecinita_dm_api)
      run: git submodule update --init --depth 1 apps/data-management-api

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: apps/gateway
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    - name: Create .env file for tests
      working-directory: apps/gateway
      run: |
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "OLLAMA_MODEL=gemma3" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "EMBEDDING_STRICT_STARTUP=false" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env
      shell: bash

    - name: Run backend integration tests (non-DB/non-LLM)
      working-directory: apps/gateway
      run: |
        pytest tests/ -m "integration and not db and not llm" -v --tb=short --junit-xml=integration-test-results.xml
      env:
        PYTHONPATH: ${{ github.workspace }}/apps/gateway
        EMBEDDING_STRICT_STARTUP: 'false'

  frontend-unit:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout frontend submodule
      run: git submodule update --init --depth 1 apps/chat-frontend

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/chat-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: apps/chat-frontend
      run: npm ci

    - name: Run frontend unit tests
      working-directory: apps/chat-frontend
      run: npm run test:coverage:unit

    - name: Pact consumer (chat → gateway)
      working-directory: apps/chat-frontend
      run: npm run test:pact

  # ---------------------------------------------------------------------------
  # pgvector integration gate
  # Spins up a real Postgres 16 + pgvector container, runs DB migrations, then
  # executes every test marked `integration and db` (excluding LLM calls).
  # This closes the gap between mocked unit tests and a live Render Postgres DB.
  # ---------------------------------------------------------------------------
  backend-integration-pgvector:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vecinita
          POSTGRES_PASSWORD: vecinita
          POSTGRES_DB: vecinita_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vecinita:vecinita@localhost:5432/vecinita_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: 'false'

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential graphviz graphviz-dev pkg-config postgresql-client

      - name: Install Python dependencies (lean CI)
        working-directory: apps/gateway
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Run DB migrations
        run: |
          bash apps/gateway/scripts/run_migrations.sh

      - name: Verify pgvector and schema
        run: |
          psql "$DATABASE_URL" -c "SELECT '[1,2,3]'::vector;" -c "\dt"

      - name: Create .env file for tests
        working-directory: apps/gateway
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" >> .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "OLLAMA_MODEL=gemma3" >> .env
          echo "USE_LOCAL_EMBEDDINGS=true" >> .env
          echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
          echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
          echo "EMBEDDING_STRICT_STARTUP=false" >> .env
          echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
          echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env

      - name: Run integration tests against pgvector DB
        working-directory: apps/gateway
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/gateway
          EMBEDDING_STRICT_STARTUP: 'false'
        run: |
          set +e
          pytest tests/ -m "integration and db and not llm" -v --tb=short \
            --junit-xml=integration-pgvector-results.xml
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No backend integration tests are currently marked with both 'integration' and 'db'; treating this as a no-op after successful schema verification."
            exit 0
          fi
          exit "$status"

