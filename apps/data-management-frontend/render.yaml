services:
  # Data Management Admin UI — React/Vite bundled into a Docker image.
  # Deploy this as a Render web service when you want container-based hosting
  # instead of a static-site deploy.
  #
  # On Render, the container writes /env.js at startup, so VITE_* values can
  # be provided as runtime env vars without rebuilding the image. Local Vite
  # builds still fall back to standard build-time env handling.
  - type: web
    name: vecinita-data-management-frontend-v1
    runtime: docker
    plan: starter
    region: virginia
    # Render resolves Docker paths from the repository root, not from the
    # directory that contains this render.yaml file.
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: ./apps/frontend
    autoDeployTrigger: checksPass
    healthCheckPath: /
    envVars:
      # Required: public URL for direct scraper requests.
      - key: VITE_DM_API_BASE_URL
        sync: false
      # Optional: direct model endpoint URL.
      - key: VITE_OLLAMA_BASE_URL
        sync: false
      # Optional: direct embedding endpoint URL.
      - key: VITE_EMBEDDING_UPSTREAM_URL
        sync: false
      # Optional: default scraper user ID sent with job submissions.
      - key: VITE_DEFAULT_SCRAPER_USER_ID
        sync: false
