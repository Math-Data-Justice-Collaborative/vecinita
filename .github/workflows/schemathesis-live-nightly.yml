# Optional scheduled Schemathesis against public Render URLs (non-blocking).
# Configure repository secrets: RENDER_AGENT_URL, RENDER_GATEWAY_URL,
# and GATEWAY_LIVE_BEARER when the gateway has ENABLE_AUTH=true.
name: Schemathesis live (optional)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  live-schemathesis:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RENDER_AGENT_URL: ${{ secrets.RENDER_AGENT_URL }}
      RENDER_GATEWAY_URL: ${{ secrets.RENDER_GATEWAY_URL }}
      GATEWAY_LIVE_BEARER: ${{ secrets.GATEWAY_LIVE_BEARER }}
      SKIP_AGENT_MAIN_IMPORT: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync backend
        run: cd backend && uv sync --extra ci

      - name: Live Schemathesis pytest aggregate
        run: make test-schemathesis-live-all

      - name: Upload JUnit (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: backend/schemathesis-report/
          if-no-files-found: ignore
