openapi: 3.0.3
info:
  title: Vecinita ChatRAG API
  version: 0.2.0
  description: Bilingual community Q&A and public corpus browse (stateless; no identity fields).
servers:
  - url: /api/v1
    description: ChatRAG backend (DigitalOcean)
paths:
  /ask:
    post:
      operationId: ask
      summary: Non-streaming bilingual Q&A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Answer with retrieval sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /ask/stream:
    post:
      operationId: askStream
      summary: Streaming answer (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Server-sent events (`token`, `sources`, `done`)
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /documents:
    get:
      operationId: listDocumentsPublic
      summary: Browse corpus documents (public)
      parameters:
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentBrowsePage"
  /documents/{document_id}:
    get:
      operationId: getDocumentPublic
      summary: Document detail for browse
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document metadata and tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentBrowseDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /tags:
    get:
      operationId: listTagsPublic
      summary: Tag facets for browse and chat filters
      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
  /health:
    get:
      operationId: health
      summary: Service health
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    AskRequest:
      type: object
      additionalProperties: false
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
        tags:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 64
    TagSummary:
      type: object
      required:
        - slug
        - label
      properties:
        slug:
          type: string
        label:
          type: string
    DocumentBrowseItem:
      type: object
      required:
        - document_id
        - url
        - tags
      properties:
        document_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        url:
          type: string
        language:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
    DocumentBrowsePage:
      type: object
      required:
        - items
        - page
        - page_size
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentBrowseItem"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    DocumentBrowseDetail:
      allOf:
        - $ref: "#/components/schemas/DocumentBrowseItem"
    TagFacet:
      type: object
      required:
        - slug
        - label
        - language
        - document_count
      properties:
        slug:
          type: string
        label:
          type: string
        language:
          type: string
        document_count:
          type: integer
          minimum: 0
    TagListResponse:
      type: object
      required:
        - tags
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagFacet"
    Source:
      type: object
      required:
        - chunk_id
        - document_id
        - score
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        score:
          type: number
          format: float
    AskResponse:
      type: object
      required:
        - answer
        - language
        - sources
      properties:
        answer:
          type: string
        language:
          type: string
          enum:
            - en
            - es
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
    HealthResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
        dependencies:
          type: object
          additionalProperties:
            type: string
          example:
            postgres: ok
            modal_embed: ok
            modal_llm: ok
    ErrorBody:
      type: object
      properties:
        detail:
          type: string
  responses:
    ValidationError:
      description: Validation or forbidden identity fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: Upstream dependency unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    NotFound:
      description: Unknown document
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
