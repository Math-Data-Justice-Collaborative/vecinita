# deploy/gcp/nginx-locations.conf
# Shared location blocks — included by both HTTP and HTTPS server blocks.
# Install to: /etc/nginx/snippets/vecinita-locations.conf

    # Gzip
    gzip on;
    gzip_types application/json text/html text/css application/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Agent API ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://vecinita_gateway/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE / streaming: disable buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         120s;
        proxy_send_timeout         120s;
        add_header X-Accel-Buffering "no" always;
    }

    # ── Direct gateway access (health, docs, ask) ───────────────────────
    location ~ ^/(health|docs|openapi.json|ask|config|info) {
        proxy_pass         http://vecinita_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Connection      "";
        proxy_buffering   off;
        proxy_read_timeout 120s;
    }

    # ── Frontend static files ────────────────────────────────────────────
    location / {
        root  /opt/vecinita/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Long-lived cache for hashed assets; no-cache for index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
