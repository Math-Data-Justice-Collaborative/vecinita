name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: 'recursive'

    - name: Install gitleaks
      run: |
        set -euo pipefail
        version="8.24.2"
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz
        sudo install gitleaks /usr/local/bin/gitleaks

    - name: Run gitleaks
      run: |
        if ! gitleaks dir . --redact --config .gitleaks.toml; then
          echo "::warning::gitleaks found potential secrets. Review findings and tighten .gitleaks.toml allowlists as needed."
        fi

  backend-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install backend quality dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    - name: Lint backend (Ruff)
      working-directory: backend
      run: python -m ruff check src tests

    - name: Check backend formatting (Black)
      working-directory: backend
      run: python -m black --check src tests

    - name: Type check backend (mypy)
      working-directory: backend
      run: python -m mypy src

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Lint frontend
      working-directory: frontend
      run: npm run lint

    - name: Check frontend formatting (Prettier)
      working-directory: frontend
      run: npm run format

    - name: Type check frontend
      working-directory: frontend
      run: npm run typecheck

  auth-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install auth dependencies
      working-directory: auth
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"

    - name: Lint auth service (Ruff)
      working-directory: auth
      run: ruff check src tests

    - name: Check auth formatting (Black)
      working-directory: auth
      run: black --check src tests

  data-management-api-structure:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Validate imported data-management repo structure
      run: |
        test -f services/data-management-api/.gitmodules
        test -d services/data-management-api/apps/backend
        test -d services/data-management-api/apps/frontend

  data-management-frontend-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/data-management-frontend/package-lock.json

    - name: Install data-management frontend dependencies
      working-directory: apps/data-management-frontend
      run: npm ci

    - name: Lint data-management frontend
      working-directory: apps/data-management-frontend
      run: npm run lint

    - name: Build data-management frontend
      working-directory: apps/data-management-frontend
      run: npm run build

  data-management-frontend-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/data-management-frontend/package-lock.json

    - name: Install data-management frontend dependencies
      working-directory: apps/data-management-frontend
      run: npm ci

    - name: Run data-management frontend tests
      working-directory: apps/data-management-frontend
      run: npm run test

  modal-proxy-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup uv
      uses: astral-sh/setup-uv@v4

    - name: Install modal-proxy dependencies
      working-directory: services/modal-proxy
      run: uv sync --all-groups

    - name: Run modal-proxy tests with coverage
      working-directory: services/modal-proxy
      run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=95

  embedding-modal-quality:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install embedding-modal dependencies
      working-directory: services/embedding-modal
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade setuptools wheel
        pip install ".[dev]"

    - name: Lint embedding-modal
      working-directory: services/embedding-modal
      run: make lint

  embedding-modal-ci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Python 3.11
