name: Frontend Coverage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/chat-frontend/**'
      - '.github/workflows/frontend-coverage.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/chat-frontend/**'
      - '.github/workflows/frontend-coverage.yml'
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'false'

    - name: Checkout frontend submodule
      run: git submodule update --init --depth 1 apps/chat-frontend

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/chat-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: apps/chat-frontend
      run: npm ci

    - name: Run frontend tests with coverage
      working-directory: apps/chat-frontend
      run: npm run test:coverage:unit

    - name: Summarize coverage
      working-directory: apps/chat-frontend
      run: |
        node -e "const fs=require('fs');const summary=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));const pct=summary?.total?.lines?.pct ?? 0;const out='Frontend line coverage: '+Number(pct).toFixed(2)+'%\\n';process.stdout.write(out);fs.writeFileSync('coverage-summary.txt', out);"

