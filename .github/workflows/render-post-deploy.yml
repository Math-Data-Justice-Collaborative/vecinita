# Runs AFTER "Render Deploy" finishes so Render checksPass can start deploys first.
# If deploy-wait lived in render-deploy.yml, Render would wait for GitHub checks that
# themselves wait for Render — a deadlock. See docs/deployment/RENDER_STAGING_PROD_CICD.md

name: Render Post-Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: [Render Deploy]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-wait:
    name: Wait for ${{ matrix.name }} deploy
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            secret_var: RENDER_AGENT_SERVICE_ID
          - name: gateway
            secret_var: RENDER_GATEWAY_SERVICE_ID
          - name: frontend
            secret_var: RENDER_FRONTEND_SERVICE_ID
          - name: data-management-frontend
            secret_var: RENDER_DATA_MANAGEMENT_FRONTEND_SERVICE_ID
          - name: data-management-api
            secret_var: RENDER_DATA_MANAGEMENT_API_SERVICE_ID
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for Render service live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets[matrix.secret_var] }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$SERVICE_ID" ]; then
            echo "::notice::RENDER_API_KEY or ${{ matrix.secret_var }} not set — skipping deploy wait"
            exit 0
          fi
          python3 scripts/github/wait_for_render_deploy.py "$SERVICE_ID" --timeout 900 --interval 30

  smoke-production:
    name: Production HTTP smoke
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    needs: [deploy-wait]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL || vars.RENDER_PROD_FRONTEND_URL || vars.RENDER_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL || vars.RENDER_PROD_AGENT_URL || vars.RENDER_AGENT_URL }}
      GATEWAY_URL: ${{ secrets.RENDER_PROD_GATEWAY_URL || secrets.RENDER_GATEWAY_URL || vars.RENDER_PROD_GATEWAY_URL || vars.RENDER_GATEWAY_URL }}
      DATA_MANAGEMENT_FRONTEND_URL: ${{ secrets.RENDER_PROD_DATA_MANAGEMENT_FRONTEND_URL || vars.RENDER_PROD_DATA_MANAGEMENT_FRONTEND_URL }}
      DATA_MANAGEMENT_API_URL: ${{ secrets.RENDER_PROD_DATA_MANAGEMENT_API_URL || vars.RENDER_PROD_DATA_MANAGEMENT_API_URL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for production services to stabilise
        run: sleep 45

      - name: Smoke production services
        run: |
          missing=0
          for key in FRONTEND_URL AGENT_URL GATEWAY_URL; do
            if [ -z "${!key}" ]; then
              echo "::notice::Production smoke URL unset: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::warning::Skipping production smoke tests — configure repository Secrets or Variables (see docs/deployment/RENDER_STAGING_PROD_CICD.md)."
            exit 0
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_agent_health_payload() {
            local url="$1"
            echo "[probe] Agent dependency health $url"
            payload=$(curl -fsS --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            JSON_PAYLOAD="$payload" python3 - <<'PY'
            import json
            import os

            payload = json.loads(os.environ["JSON_PAYLOAD"])
            status = payload.get("status")
            readiness = payload.get("readiness")
            if status != "ok":
              raise SystemExit(f"Agent status is not ok: {status}")
            if readiness == "degraded":
              raise SystemExit(f"Agent readiness degraded: {payload}")
            print(f"[result] Agent health status={status} readiness={readiness}")
            PY
          }

          check_gateway_health_payload() {
            local base_url="$1"
            local primary_url="${base_url%/}/api/v1/health"
            local fallback_url="${base_url%/}/health"
            local payload
            local status

            echo "[probe] Gateway dependency health $primary_url"
            status=$(curl -o /tmp/gateway-health.json -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$primary_url")

            if [ "$status" = "404" ]; then
              echo "[info] Gateway /api/v1/health not found, falling back to /health"
              status=$(curl -o /tmp/gateway-health.json -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$fallback_url")
            fi

            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] Gateway health probe failed with HTTP $status"
              exit 1
            fi

            payload=$(cat /tmp/gateway-health.json)
            JSON_PAYLOAD="$payload" python3 - <<'PY'
            import json
            import os

            payload = json.loads(os.environ["JSON_PAYLOAD"])
            status = payload.get("status")
            agent = payload.get("agent_service")
            embedding = payload.get("embedding_service")
            if status != "ok":
                raise SystemExit(f"Gateway status is not ok: {status}")
            if agent != "ok" or embedding != "ok":
                raise SystemExit(f"Gateway dependencies unhealthy: agent={agent}, embedding={embedding}, payload={payload}")
            print(f"[result] Gateway status={status} agent={agent} embedding={embedding}")
            PY
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_agent_health_payload "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_gateway_health_payload "$GATEWAY_URL"
          check_url "Gateway documents tags" "$GATEWAY_URL/api/v1/documents/tags?limit=5"
          check_url "Data management frontend health" "$DATA_MANAGEMENT_FRONTEND_URL/"
          check_url "Data management API health" "$DATA_MANAGEMENT_API_URL/health"

  post-deploy-smoke:
    name: Post-deploy live smoke tests
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    needs: [deploy-wait]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      RENDER_GATEWAY_URL: ${{ secrets.RENDER_GATEWAY_URL }}
      RENDER_AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL }}
      RENDER_FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen --extra ci

      - name: Wait 5 minutes post-deploy stabilisation
        run: sleep 300

      - name: Run live health smoke tests
        run: uv run python -m pytest tests/live/ -m live --timeout=120 -v --tb=short --junit-xml=live-smoke-results.xml || true

      - name: Upload live smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-results
          path: backend/live-smoke-results.xml
          if-no-files-found: ignore
