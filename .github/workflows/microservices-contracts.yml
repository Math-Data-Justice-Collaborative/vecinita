name: Microservices Contracts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-context:
    runs-on: ubuntu-22.04
    outputs:
      has_cross_repo_token: ${{ steps.detect.outputs.has_cross_repo_token }}
    steps:
      - name: Detect cross-repo token availability
        id: detect
        env:
          HAS_CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN != '' }}
        run: echo "has_cross_repo_token=${HAS_CROSS_REPO_TOKEN}" >> "$GITHUB_OUTPUT"

  microservices-contracts:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false
          token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

      - name: Checkout required service submodules
        run: git submodule update --init --depth 1 services/model-modal

      - name: Build selected microservices images
        run: |
          docker compose -f docker-compose.microservices.yml build \
            model-service embedding-service scraper-service chat-agent chat-gateway

      - name: Start microservices contract stack
        run: |
          docker compose -f docker-compose.microservices.yml up -d \
            postgres postgrest ollama \
            model-service embedding-service scraper-service \
            chat-agent chat-gateway

      - name: Wait for core health endpoints
        run: |
          set -euo pipefail
          for endpoint in \
            http://localhost:8008/health \
            http://localhost:8011/health \
            http://localhost:8020/health \
            http://localhost:8004/health
          do
            echo "Waiting for ${endpoint}"
            for i in $(seq 1 90); do
              if curl -fsS "${endpoint}" >/dev/null; then
                echo "Ready: ${endpoint}"
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "Endpoint did not become healthy: ${endpoint}"
                docker compose -f docker-compose.microservices.yml ps
                docker compose -f docker-compose.microservices.yml logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tests

      - name: Run microservices contract tests
        env:
          REQUIRE_MICROSERVICES: "1"
          GATEWAY_URL: http://localhost:8004
          MODEL_URL: http://localhost:8008
          EMBEDDING_URL: http://localhost:8011
          SCRAPER_URL: http://localhost:8020
        run: |
          cd tests
          pytest integration/test_microservices_contracts.py -v

      - name: Dump compose status on failure
        if: failure()
        run: |
          docker compose -f docker-compose.microservices.yml ps
          docker compose -f docker-compose.microservices.yml logs --tail=300

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.microservices.yml down -v --remove-orphans

  microservices-contracts-skipped:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token != 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Explain skip
        run: echo "::notice::Skipping microservices contract tests because CROSS_REPO_WORKFLOW_TOKEN is not configured."
