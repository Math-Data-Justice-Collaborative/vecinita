[project]
name = "vecinita-config"
version = "0.1.0"
description = "Shared configuration loading, env var parsing, and service endpoint resolution for Vecinita"
requires-python = ">=3.11"
dependencies = [
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "vecinita-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_config"]
