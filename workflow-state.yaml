decisions_log:
  - R1: five-app monorepo in vecinita — ADR-001
  - R2: hybrid Modal + DigitalOcean — ADR-002
  - R3: greenfield APIs, siblings reference only — ADR-003
  - R4: DigitalOcean Managed Postgres + pgvector for Database app
  - R5: no identity auth — infra credentials only — ADR-004
  - R9: minimize cost — ADR-004
  - R10: data sovereignty US-only self-hosted default — ADR-004
  - R10a: US regions nyc1/sfo3 — user confirmed
  - R9: budget 25 target / 50 cap USD per month — user confirmed
  - R11: zero personal data option B — ADR-004
  - R6: gateway deferred post-v1 (TP-001) — 04-tech-plan
