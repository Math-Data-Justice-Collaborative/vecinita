################################################################################
# PROJECT: Vecinita - Community Q&A Assistant
# FILE: docker-compose.yml
# VERSION: 2.4.0 (Rios VM Production Standard)
# DATE: 2026-02-09
# DESCRIPTION: Finalized orchestration for the Vecinita RAG engine.
# This configuration strictly follows the "Single Source of Truth" principle,
# pulling all secrets exclusively from the .env file.
################################################################################

services:
  vecinita-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vecinita-app:latest
    container_name: vecinita-app
    
    # --- SINGLE SOURCE OF TRUTH ---
    # Injects all variables from .env (Supabase, Groq, OpenAI, etc.)
    # This bypasses VM shell memory to prevent "Invalid API Key" errors.
    env_file:
      - .env

    # --- PORT MIGRATION ---
    # Standardizing on port 8080 for the RIOS VM environment
    ports:
      - "8080:8080"
    
    # --- RUNTIME OVERRIDES ---
    # Only non-sensitive operational flags are kept here.
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1

    # --- PERSISTENCE & SYNC ---
    # Mounts local source code for real-time updates without image rebuilds.
    volumes:
      - ./src:/app/src

    # --- RELIABILITY ---
    restart: unless-stopped

    # --- HEALTHCHECK ---
    # Monitors the FastAPI /health endpoint on the migrated port 8080.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Ample time for LLM/Embedding models to load into RAM

networks:
  default:
    name: vecinita-net

# EOF - RIOS VM DEPLOYMENT STANDARD
