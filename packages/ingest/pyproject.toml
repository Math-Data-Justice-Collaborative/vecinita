[project]
name = "vecinita-ingest"
version = "0.1.0"
description = "Scrape and chunk helpers for corpus ingest"
requires-python = ">=3.11,<3.12"
dependencies = [
    "httpx>=0.27,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_ingest"]
