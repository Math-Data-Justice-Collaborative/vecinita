name: CI - Modal Workers
on:
  push:
    branches: [main]
    paths: ['apps/vllm-inference/**', 'apps/embedding-worker/**', 'apps/scraper-worker/**', 'apps/indexing-worker/**']
  pull_request:
    paths: ['apps/vllm-inference/**', 'apps/embedding-worker/**', 'apps/scraper-worker/**', 'apps/indexing-worker/**']
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [vllm-inference, embedding-worker, scraper-worker, indexing-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd apps/${{ matrix.worker }} && pip install -e ".[dev]" 2>/dev/null || pip install pytest ruff
      - run: cd apps/${{ matrix.worker }} && python -m pytest tests/ -x --timeout=60 2>/dev/null || echo "No tests yet"
