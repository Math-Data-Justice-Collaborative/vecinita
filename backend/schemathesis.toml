# Schemathesis project config (CLI: `schemathesis run` auto-discovers this file from cwd or parents).
#
# Configuration guide (auth, timeouts, phases, per-operation overrides):
#   https://schemathesis.readthedocs.io/en/stable/configuration/
# Full option reference:
#   https://schemathesis.readthedocs.io/en/stable/reference/configuration/
#
# Hooks + TraceCov CLI: https://schemathesis.readthedocs.io/en/stable/guides/coverage/
# Pytest TraceCov needs ``tracecov_schema`` in tests/integration/conftest.py.
# Live wrapper: scripts/run_schemathesis_live.sh (passes CLI flags that override these defaults).
#
# Schema-coverage gate (TraceCov): Schemathesis validates this file with ``additionalProperties: false``,
# so TraceCov thresholds cannot live here. Use instead:
#   - Pytest: ``--tracecov-fail-under=100`` on full schema runs (see backend ``Makefile`` ``test-schema``); avoid a global
#     ``tracecov_fail_under`` ini so single-test invocations from the same file are not forced to hit 100% alone.
#   - ``schemathesis run`` CLI: env ``SCHEMATHESIS_COVERAGE_FAIL_UNDER`` (0–100); ``tests/schemathesis_hooks.py`` enforces it
#     after the TraceCov report. The live script defaults this to 100 when coverage is enabled (override as needed).
#
# Resolution order (highest wins): CLI → operation phases → global phases → [[operations]] → file defaults.

continue-on-failure = true

# Default hooks module so `cd backend && schemathesis run …` works without exporting SCHEMATHESIS_HOOKS.
hooks = "tests.schemathesis_hooks"

# Slow / cold APIs (guide: raise for flaky timeouts). CLI `--request-timeout` overrides when set.
request-timeout = 180.0
wait-for-schema = 90.0
request-retries = 2

# Hypothesis health checks (gateway path params often trip filter_too_much / too_slow without API bugs).
suppress-health-check = ["filter_too_much", "too_slow"]

[generation]
# CLI `--max-examples` overrides. Offline pytest uses its own @settings(max_examples=…).
max-examples = 25

# Prefer response-linked values when the spec has no explicit examples (CLI phases).
# https://schemathesis.readthedocs.io/en/stable/reference/configuration/#phases-examples-fill-missing
[phases.examples]
fill-missing = true

# Stateful testing (Hypothesis state machine): chains operations using OpenAPI links and
# dependency analysis (e.g. POST /scrape → GET /scrape/{job_id} → POST …/cancel).
# https://schemathesis.readthedocs.io/en/stable/stateful.html
#
# Enabled globally; ``[[operations]]`` blocks below turn stateful *off* for non-queue routes
# (Schemathesis merges operation phase overrides with project defaults — see configuration docs).
[phases.stateful]
enabled = true
max-steps = 8

# POST/create before GET/delete ordering for fuzzing (CLI); default is "auto" — explicit for clarity.
[phases.fuzzing]
operation-ordering = "auto"

[reports]
directory = "schemathesis-report"

[reports.junit]
enabled = true

[output.sanitization]
enabled = false

# Tier A-style defaults: avoid Allow-header / unsupported-method noise (see TESTING_DOCUMENTATION.md).
[checks]
unsupported_method.enabled = false

# Reindex hits upstream DNS from many hosts; excluded from live shell script by default — mirror here for raw CLI.
[[operations]]
include-name = "POST /api/v1/scrape/reindex"
enabled = false

# Gateway job queues (scrape + modal-jobs): stateful mixes invalid bodies; align with pytest
# ``test_gateway_*_stateful`` (negative_data_rejection disabled for these paths only).
# Modal-jobs scraper proxy paths appear in the gateway OpenAPI when gateway env enables that surface;
# exercise them via live schema jobs in ``test.yml`` ``backend-schema`` (same regex family as here).
# Feature 012 (queued page ingestion): ``GET /modal-jobs/scraper/{job_id}`` may echo ``pipeline_stage``,
# ``error_category``, ``correlation_id``, and ``metadata`` on gateway-persisted bodies — keep stateful
# examples aligned with ``GatewayModalScrapeJobBody`` when extending OpenAPI (**SC-006**).
[[operations]]
include-path-regex = "^/api/v1/(scrape|modal-jobs)(/|$)"

[operations.checks.negative_data_rejection]
enabled = false

# Keep stateful off outside job-queue surfaces (agent, documents, embeddings, meta).
[[operations]]
include-path-regex = "^/api/v1/(ask|documents|embed)(/|$)|^/(config|health)$|^/integrations/"

[operations.phases.stateful]
enabled = false
