[project]
name = "vecinita-tagging"
version = "0.1.0"
description = "LLM tag prompts, vocabulary merge, and cap enforcement (EV-001)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "httpx>=0.27,<1",
    "vecinita-llm-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_tagging"]

[tool.uv.sources]
vecinita-llm-client = { workspace = true }
