name: CI - Agent
on:
  push:
    branches: [main]
    paths: ['apps/agent/**', 'packages/**']
  pull_request:
    paths: ['apps/agent/**', 'packages/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install uv && cd apps/agent && uv sync
      - run: cd apps/agent && uv run ruff check src/
      - run: cd apps/agent && uv run pytest tests/ -x --timeout=60
