name: Quality Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  workflow-context:
    runs-on: ubuntu-22.04
    outputs:
      has_cross_repo_token: ${{ steps.detect.outputs.has_cross_repo_token }}
    steps:
      - name: Detect cross-repo token availability
        id: detect
        env:
          HAS_CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN != '' }}
        run: echo "has_cross_repo_token=${HAS_CROSS_REPO_TOKEN}" >> "$GITHUB_OUTPUT"

  backend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      # Installs [project.optional-dependencies].ci only (not UV [dependency-groups]).
      # Pytest imports tests/pact/*.py during collection before -m deselection; pact-python must stay in .ci.
      - name: Install backend CI dependencies (locked; matches local uv)
        working-directory: backend
        run: uv sync --frozen --extra ci

      - name: Lint backend (Ruff)
        working-directory: backend
        run: uv run ruff check src tests

      - name: Check backend formatting (Black)
        working-directory: backend
        run: uv run black --check src tests scripts

      - name: Type check backend (mypy)
        working-directory: backend
        run: uv run mypy src

      - name: Install ripgrep (Modal HTTP ban scanner)
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: Modal HTTP ban (SC-005 / FR-001)
        continue-on-error: true
        run: make check-modal-http

      - name: Set up Node.js (OpenAPI Generator CLI via npx)
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: OpenAPI codegen verify (drift gate when schema URL repo vars are set)
        env:
          GATEWAY_SCHEMA_URL: ${{ vars.GATEWAY_SCHEMA_URL }}
          DATA_MANAGEMENT_SCHEMA_URL: ${{ vars.DATA_MANAGEMENT_SCHEMA_URL }}
          AGENT_SCHEMA_URL: ${{ vars.AGENT_SCHEMA_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GATEWAY_SCHEMA_URL:-}" ] || [ -z "${DATA_MANAGEMENT_SCHEMA_URL:-}" ] || [ -z "${AGENT_SCHEMA_URL:-}" ]; then
            echo "::notice title=openapi-codegen-verify::Skipping make openapi-codegen-verify — set repository variables GATEWAY_SCHEMA_URL, DATA_MANAGEMENT_SCHEMA_URL, and AGENT_SCHEMA_URL to enable."
            exit 0
          fi
          make openapi-codegen-verify

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout frontend submodule
        run: git submodule update --init --depth 1 frontend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

  data-management-api-structure:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false
          token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

      - name: Checkout data-management API submodule
        run: git submodule update --init --depth 1 services/data-management-api

      - name: Validate imported data-management repo structure
        run: |
          test -f services/data-management-api/.gitmodules
          test -d services/data-management-api/apps/backend
          test -d services/data-management-api/apps/frontend

  data-management-frontend-quality:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false
          token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

      - name: Checkout data-management frontend submodule
        run: git submodule update --init --depth 1 apps/data-management-frontend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/data-management-frontend/package-lock.json

      - name: Install data-management frontend dependencies
        working-directory: apps/data-management-frontend
        run: npm ci

      - name: Lint data-management frontend
        working-directory: apps/data-management-frontend
        run: npm run lint

      - name: Build data-management frontend
        working-directory: apps/data-management-frontend
        run: npm run build

  scraper-quality:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false
          token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

      - name: Checkout scraper submodule
        run: git submodule update --init --depth 1 services/scraper

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install scraper dependencies
        working-directory: services/scraper
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]"

      - name: Lint scraper
        working-directory: services/scraper
        run: make lint

      - name: Check scraper formatting
        working-directory: services/scraper
        run: black --check src/ tests/

      - name: Type check scraper
        working-directory: services/scraper
        run: make type-check

  embedding-modal-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout embedding-modal submodule
        run: git submodule update --init --depth 1 services/embedding-modal

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install embedding-modal dependencies
        working-directory: services/embedding-modal
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install ".[dev]"

      - name: Lint embedding-modal
        working-directory: services/embedding-modal
        run: make lint

  model-modal-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout model-modal submodule
        run: git submodule update --init --depth 1 services/model-modal

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install model-modal dependencies
        working-directory: services/model-modal
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install ".[dev]"

      - name: Lint model-modal
        working-directory: services/model-modal
        run: make lint
