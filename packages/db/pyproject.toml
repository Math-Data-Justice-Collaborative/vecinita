[project]
name = "vecinita-db"
version = "0.1.0"
description = "Shared database models, connection pooling, migrations, and security for Vecinita services"
requires-python = ">=3.11"
dependencies = [
    "psycopg2-binary>=2.9.9",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_db"]
