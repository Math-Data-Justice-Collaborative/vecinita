name: Render Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "backend/**"
      - "frontend/**"
      - "render.yaml"
      - "render.staging.yaml"
      - ".github/workflows/render-deploy.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend CI dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Lint backend (Ruff)
        working-directory: backend
        run: python -m ruff check src tests

      - name: Check backend formatting (Black)
        working-directory: backend
        run: python -m black --check src tests

      - name: Type check backend (mypy)
        working-directory: backend
        run: python -m mypy src

      - name: Run backend unit tests (non-LLM)
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test-key
          DATABASE_URL=postgresql://test
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=llama3.1:8b
          USE_LOCAL_EMBEDDINGS=true
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
          EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token
          REINDEX_TRIGGER_TOKEN=test-reindex-token
          REINDEX_SERVICE_URL=https://example.modal.run
          EOF
          pytest tests/ -m "unit and not llm" -v --tb=short --junit-xml=test-results.xml

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint -- --quiet

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage:unit

  deploy-staging:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: staging
    env:
      RENDER_STAGING_DEPLOY_HOOK_AGENT: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_AGENT }}
      RENDER_STAGING_DEPLOY_HOOK_EMBEDDING: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_EMBEDDING }}
      RENDER_STAGING_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_FRONTEND }}
      RENDER_STAGING_DEPLOY_HOOK_SCRAPER: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_SCRAPER }}
    steps:
      - name: Trigger staging agent deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_AGENT != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_AGENT" || echo "::notice::Staging agent deploy hook request failed."

      - name: Trigger staging embedding deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_EMBEDDING != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_EMBEDDING" || echo "::notice::Staging embedding deploy hook request failed."

      - name: Trigger staging frontend deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_FRONTEND" || echo "::notice::Staging frontend deploy hook request failed."

      - name: Trigger staging scraper deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_SCRAPER != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_SCRAPER" || echo "::notice::Staging scraper deploy hook request failed."

      - name: Verify at least one staging deploy hook is configured
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_AGENT" ] && \
             [ -z "$RENDER_STAGING_DEPLOY_HOOK_EMBEDDING" ] && \
             [ -z "$RENDER_STAGING_DEPLOY_HOOK_FRONTEND" ] && \
             [ -z "$RENDER_STAGING_DEPLOY_HOOK_SCRAPER" ]; then
            echo "No staging Render deploy hook secrets are configured."
            echo "Set at least one of:"
            echo "  RENDER_STAGING_DEPLOY_HOOK_AGENT"
            echo "  RENDER_STAGING_DEPLOY_HOOK_EMBEDDING"
            echo "  RENDER_STAGING_DEPLOY_HOOK_FRONTEND"
            echo "  RENDER_STAGING_DEPLOY_HOOK_SCRAPER"
            echo "::warning::Skipping staging deploy because no deploy hook secrets are configured."
            exit 0
          fi

  smoke-staging:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    needs: [deploy-staging]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_STAGING_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_STAGING_AGENT_URL }}
      EMBED_URL: ${{ secrets.RENDER_STAGING_EMBEDDING_URL }}
    steps:
      - name: Wait for staging services to stabilise
        run: sleep 45

      - name: Smoke staging services
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$AGENT_URL" ] && [ -z "$EMBED_URL" ]; then
            echo "No staging service URLs configured; skipping smoke probes."
            exit 0
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_url "Agent health" "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_url "Embedding health" "$EMBED_URL/health"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: production
    env:
      RENDER_PROD_DEPLOY_HOOK_AGENT: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_AGENT || secrets.RENDER_DEPLOY_HOOK_AGENT || secrets.RENDER_VECINITA_AGENT_DEPLOY_HOOK }}
      RENDER_PROD_DEPLOY_HOOK_EMBEDDING: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_EMBEDDING || secrets.RENDER_DEPLOY_HOOK_EMBEDDING || secrets.RENDER_VECINITA_EMBEDDING_DEPLOY_HOOK }}
      RENDER_PROD_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_FRONTEND || secrets.RENDER_DEPLOY_HOOK_FRONTEND || secrets.RENDER_VECINITA_FRONTEND_DEPLOY_HOOK }}
      RENDER_PROD_DEPLOY_HOOK_SCRAPER: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_SCRAPER || secrets.RENDER_DEPLOY_HOOK_SCRAPER }}
    steps:
      - name: Trigger production agent deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_AGENT != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_AGENT" || echo "::notice::Production agent deploy hook request failed."

      - name: Trigger production embedding deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_EMBEDDING != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_EMBEDDING" || echo "::notice::Production embedding deploy hook request failed."

      - name: Trigger production frontend deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_FRONTEND" || echo "::notice::Production frontend deploy hook request failed."

      - name: Trigger production scraper deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_SCRAPER != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_SCRAPER" || echo "::notice::Production scraper deploy hook request failed."

      - name: Verify at least one production deploy hook is configured
        run: |
          if [ -z "$RENDER_PROD_DEPLOY_HOOK_AGENT" ] && \
             [ -z "$RENDER_PROD_DEPLOY_HOOK_EMBEDDING" ] && \
             [ -z "$RENDER_PROD_DEPLOY_HOOK_FRONTEND" ] && \
             [ -z "$RENDER_PROD_DEPLOY_HOOK_SCRAPER" ]; then
            echo "No production Render deploy hook secrets are configured."
            echo "Set at least one of:"
            echo "  RENDER_PROD_DEPLOY_HOOK_AGENT"
            echo "  RENDER_PROD_DEPLOY_HOOK_EMBEDDING"
            echo "  RENDER_PROD_DEPLOY_HOOK_FRONTEND"
            echo "  RENDER_PROD_DEPLOY_HOOK_SCRAPER"
            echo "::warning::Skipping production deploy because no deploy hook secrets are configured."
            exit 0
          fi

  smoke-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    needs: [deploy-production]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL }}
      EMBED_URL: ${{ secrets.RENDER_PROD_EMBEDDING_URL || secrets.RENDER_EMBEDDING_URL }}
    steps:
      - name: Wait for production services to stabilise
        run: sleep 45

      - name: Smoke production services
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$AGENT_URL" ] && [ -z "$EMBED_URL" ]; then
            echo "No production service URLs configured; skipping smoke probes."
            exit 0
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_url "Agent health" "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_url "Embedding health" "$EMBED_URL/health"
