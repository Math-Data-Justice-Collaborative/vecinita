# Local development — use profiles to start subsets
# docker compose --profile core up        # postgres + pgadmin
# docker compose --profile services up    # backend APIs
# docker compose --profile frontends up   # frontend dev servers
# docker compose --profile full up        # everything

services:
  postgres:
    profiles: ["core", "full"]
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vecinita
      POSTGRES_PASSWORD: vecinita
      POSTGRES_DB: vecinita
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vecinita"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    profiles: ["core", "full"]
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vecinita.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    profiles: ["services", "full"]
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile.gateway
    ports:
      - "8004:10000"
    env_file: .environments/gateway.env
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    profiles: ["services", "full"]
    build:
      context: .
      dockerfile: ./apps/agent/Dockerfile
    ports:
      - "8000:10000"
    env_file: .environments/agent.env
    depends_on:
      postgres:
        condition: service_healthy

  data-management-api:
    profiles: ["services", "full"]
    build:
      context: .
      dockerfile: ./apps/scraper-worker/Dockerfile
    ports:
      - "8005:10000"
    env_file: .environments/data-management-api.env
    depends_on:
      postgres:
        condition: service_healthy

  chat-frontend:
    profiles: ["frontends", "full"]
    build:
      context: ./apps/chat-frontend
    ports:
      - "5173:5173"
    env_file: .environments/chat-frontend.env

  data-management-frontend:
    profiles: ["frontends", "full"]
    build:
      context: ./apps/data-management-frontend
    ports:
      - "5174:5174"
    env_file: .environments/data-management-frontend.env

volumes:
  postgres_data:
