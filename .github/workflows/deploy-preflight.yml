# Pre-deploy gate on main — build smoke + Modal secrets (no live deploy).
# Modal has no `deploy --dry-run`; verify_build.sh imports app modules instead.
name: Deploy preflight

on:
  push:
    branches: [main]
  workflow_dispatch:

# Do not cancel in-progress runs: rapid main pushes otherwise leave every run as
# "failure" with 0 jobs (agents only watched ci.yml and thought main was green).
concurrency:
  group: deploy-preflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build smoke (uv sync + Modal app import)
        run: bash scripts/deploy/verify_build.sh

  modal-secrets:
    runs-on: ubuntu-latest
    # secrets.* is not allowed in job-level `if` — detect tokens in a step instead.
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Modal GitHub secrets
        id: modal_tokens
        run: |
          if [ -z "${MODAL_TOKEN_ID}" ] || [ -z "${MODAL_TOKEN_SECRET}" ]; then
            echo "Modal GitHub secrets not configured — skipping verify_secrets.sh"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Modal CLI
        if: steps.modal_tokens.outputs.skip != 'true'
        run: pip install 'modal>=1.2.6,<2'

      - name: Verify Modal secrets and volumes
        if: steps.modal_tokens.outputs.skip != 'true'
        run: bash scripts/deploy/verify_secrets.sh
