name: Retrieval Quality Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  retrieval-quality:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN || github.token }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            graphviz \
            graphviz-dev \
            pkg-config

      - name: Install Python dependencies (lean CI)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Create .env file for retrieval tests
        working-directory: backend
        run: |
          echo "SUPABASE_URL=https://test.supabase.co" >> .env
          echo "SUPABASE_KEY=test-key" >> .env
          echo "DATABASE_URL=postgresql://test" >> .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "OLLAMA_MODEL=llama3.1:8b" >> .env
          echo "USE_LOCAL_EMBEDDINGS=true" >> .env
          echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
          echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
          echo "EMBEDDING_STRICT_STARTUP=false" >> .env
          echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
          echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env

      - name: Run retrieval quality e2e gate
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          EMBEDDING_STRICT_STARTUP: 'false'
        run: |
          pytest tests/e2e/test_retrieval_quality_gate.py \
            -m "e2e and retrieval_quality" \
            -v --tb=short --junit-xml=retrieval-quality-results.xml

