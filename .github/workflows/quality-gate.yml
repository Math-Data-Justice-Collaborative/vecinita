name: Quality Gate
on:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff
      - run: ruff check apps/gateway/src/ apps/agent/src/ packages/
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: |
          for fe in apps/chat-frontend apps/data-management-frontend; do
            if [ -f "$fe/tsconfig.json" ]; then
              cd "$fe" && npm ci && npx tsc --noEmit && cd ../..
            fi
          done
