name: Render Smoke Tests

# Runs after a successful Render deployment to verify live service health.
# Requires these repository secrets (skip individual checks if not set):
#   RENDER_FRONTEND_URL    — e.g. https://vecinita-frontend.onrender.com
#   RENDER_AGENT_URL       — e.g. https://vecinita-agent.onrender.com

on:
  workflow_dispatch:
    inputs:
      render_frontend_url:
        description: "Frontend base URL (overrides secret)"
        required: false
      render_agent_url:
        description: "Agent base URL (overrides secret)"
        required: false

jobs:
  smoke:
    name: Post-deploy smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    env:
      FRONTEND_URL: ${{ inputs.render_frontend_url || secrets.RENDER_FRONTEND_URL }}
      AGENT_URL:    ${{ inputs.render_agent_url    || secrets.RENDER_AGENT_URL }}

    steps:
      - name: Check at least one URL is configured
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$AGENT_URL" ]; then
            echo "[skip] No Render service URLs configured. Set RENDER_FRONTEND_URL,"
            echo "       RENDER_AGENT_URL secrets to enable"
            echo "       post-deploy smoke testing."
            exit 0
          fi

      - name: Wait for services to stabilise
        run: |
          echo "[info] Waiting 45 s for Render services to become ready..."
          sleep 45

      # -----------------------------------------------------------------------
      # Frontend
      # -----------------------------------------------------------------------
      - name: Smoke — Frontend /health
        if: ${{ env.FRONTEND_URL != '' }}
        run: |
          echo "[probe] GET $FRONTEND_URL/health"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --retry 4 --retry-delay 10 --retry-all-errors \
            --max-time 30 "$FRONTEND_URL/health")
          echo "[result] HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "[fail] Frontend /health returned $STATUS"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Agent / gateway
      # -----------------------------------------------------------------------
      - name: Smoke — Agent /health
        if: ${{ env.AGENT_URL != '' }}
        run: |
          echo "[probe] GET $AGENT_URL/health"
          PAYLOAD=$(curl -fsS \
            --retry 4 --retry-delay 10 --retry-all-errors \
            --max-time 30 "$AGENT_URL/health")
          JSON_PAYLOAD="$PAYLOAD" python3 - <<'PY'
import json
import os

payload = json.loads(os.environ["JSON_PAYLOAD"])
if payload.get("status") != "ok":
    raise SystemExit(f"Agent status is not ok: {payload}")
if payload.get("readiness") == "degraded":
    raise SystemExit(f"Agent readiness degraded: {payload}")
print(f"[result] Agent status={payload.get('status')} readiness={payload.get('readiness')}")
PY

      - name: Smoke — Gateway /api/v1/health
        if: ${{ env.AGENT_URL != '' }}
        run: |
          echo "[probe] GET $AGENT_URL/api/v1/health"
          STATUS=$(curl -o /tmp/gateway-health.json -s -w "%{http_code}" \
            --retry 4 --retry-delay 10 --retry-all-errors \
            --max-time 30 "$AGENT_URL/api/v1/health")
          if [ "$STATUS" = "404" ]; then
            echo "[skip] /api/v1/health not available on AGENT_URL target"
            exit 0
          fi
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "[fail] Gateway /api/v1/health returned $STATUS"
            exit 1
          fi
          PAYLOAD=$(cat /tmp/gateway-health.json)
          JSON_PAYLOAD="$PAYLOAD" python3 - <<'PY'
import json
import os

payload = json.loads(os.environ["JSON_PAYLOAD"])
if payload.get("status") != "ok":
    raise SystemExit(f"Gateway status is not ok: {payload}")
if payload.get("agent_service") != "ok" or payload.get("embedding_service") != "ok":
    raise SystemExit(f"Gateway dependencies unhealthy: {payload}")
print(
    "[result] Gateway status="
    f"{payload.get('status')} agent={payload.get('agent_service')} embedding={payload.get('embedding_service')}"
)
PY

      - name: Smoke — Agent /api/v1/ask/config
        if: ${{ env.AGENT_URL != '' }}
        run: |
          echo "[probe] GET $AGENT_URL/api/v1/ask/config"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --retry 4 --retry-delay 10 --retry-all-errors \
            --max-time 30 "$AGENT_URL/api/v1/ask/config")
          echo "[result] HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "[fail] /api/v1/ask/config returned $STATUS"
            exit 1
          fi

      - name: Smoke — Agent /api/v1/documents/overview (read path)
        if: ${{ env.AGENT_URL != '' }}
        run: |
          echo "[probe] GET $AGENT_URL/api/v1/documents/overview"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --retry 4 --retry-delay 10 --retry-all-errors \
            --max-time 30 "$AGENT_URL/api/v1/documents/overview")
          echo "[result] HTTP $STATUS"
          # 401/403 acceptable — endpoint exists but may require auth
          if [ "$STATUS" -eq 404 ] || [ "$STATUS" -ge 500 ]; then
            echo "[fail] /api/v1/documents/overview returned $STATUS"
            exit 1
          fi

      - name: Smoke summary
        if: always()
        run: |
          echo "============================================="
          echo "  Render post-deploy smoke tests complete"
          echo "  Frontend : ${FRONTEND_URL:-(not configured)}"
          echo "  Agent    : ${AGENT_URL:-(not configured)}"
          echo "============================================="
