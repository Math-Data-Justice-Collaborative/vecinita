services:
  # Staging blueprint — all env vars come from the shared env group in the
  # Render dashboard. Only infrastructure bindings (fromDatabase, fromService)
  # and PORT are declared here. sync: false on everything else ensures the
  # env group is never overwritten by this blueprint.
  - type: web
    name: vecinita-agent-staging
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres-staging
          property: connectionString
      - key: PYTHONUNBUFFERED
        sync: false
      - key: TF_ENABLE_ONEDNN_OPTS
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: MODAL_OLLAMA_ENDPOINT
        sync: false
      - key: MODAL_EMBEDDING_ENDPOINT
        sync: false
      - key: EMBEDDING_SERVICE_URL
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: EMBEDDING_STRICT_STARTUP
        sync: false
      - key: DEFAULT_PROVIDER
        sync: false
      - key: DEFAULT_MODEL
        sync: false
      - key: FORCE_LOCAL_MODAL_LLM
        sync: false
      - key: AGENT_ENFORCE_PROXY
        sync: false
      - key: LOCK_MODEL_SELECTION
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_API_PROXY_KEY
        sync: false
      - key: MODAL_API_PROXY_SECRET
        sync: false
      - key: PROXY_AUTH_TOKEN
        sync: false
      - key: MODAL_PROXY_AUTH_TOKEN
        sync: false
      - key: REINDEX_SERVICE_URL
        sync: false
      - key: REINDEX_TRIGGER_TOKEN
        sync: false
      - key: BACKEND_PREFLIGHT_ENABLED
        sync: false
      - key: BACKEND_PREFLIGHT_STRICT
        sync: false
      - key: GUARDRAILS_REQUIRE_HUB_VALIDATOR
        sync: false
      - key: GUARDRAILS_HUB_AUTO_INSTALL
        sync: false
      - key: GUARDRAILS_PERSISTENCE_DIR
        sync: false
      - key: CHROMA_REQUIRED
        sync: false
      - key: DB_DATA_MODE
        sync: false
      - key: VECTOR_SYNC_TARGET
        sync: false
      - key: VECTOR_SYNC_SUPABASE_FALLBACK_READS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false

  - type: web
    name: vecinita-frontend-staging
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: VITE_GATEWAY_URL
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_AGENT_REQUEST_TIMEOUT_MS
        sync: false
      - key: VITE_AGENT_STREAM_TIMEOUT_MS
        sync: false
      - key: VITE_AGENT_STREAM_FIRST_EVENT_TIMEOUT_MS
        sync: false
      - key: VITE_DEV_ADMIN_ENABLED
        sync: false
      - key: VITE_DEV_ADMIN_EMAIL
        sync: false
      - key: VITE_DEV_ADMIN_PASSWORD
        sync: false
      - key: VITE_DEV_ADMIN_TOKEN
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: vecinita-gateway-staging
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: sh -c 'uvicorn src.api.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    autoDeployTrigger: off
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: AGENT_SERVICE_URL
        fromService:
          name: vecinita-agent-staging
          type: web
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: vecinita-postgres-staging
          property: connectionString
      - key: PYTHONUNBUFFERED
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: AGENT_TIMEOUT
        sync: false
      - key: AGENT_STREAM_TIMEOUT
        sync: false
      - key: EMBEDDING_SERVICE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: MODAL_EMBEDDING_ENDPOINT
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: MODAL_API_PROXY_KEY
        sync: false
      - key: MODAL_API_PROXY_SECRET
        sync: false
      - key: PROXY_AUTH_TOKEN
        sync: false
      - key: MODAL_PROXY_AUTH_TOKEN
        sync: false
      - key: EMBEDDING_SERVICE_AUTH_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_UPLOADS_BUCKET
        sync: false
      - key: DEV_ADMIN_ENABLED
        sync: false
      - key: DEV_ADMIN_BEARER_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: DB_DATA_MODE
        sync: false
      - key: VECTOR_SYNC_TARGET
        sync: false
      - key: VECTOR_SYNC_SUPABASE_FALLBACK_READS
        sync: false

databases:
  - name: vecinita-postgres-staging
    region: virginia
    plan: basic-256mb
    databaseName: vecinita_staging
    user: vecinita
    postgresMajorVersion: "16"
    diskSizeGB: 1
    ipAllowList: []
