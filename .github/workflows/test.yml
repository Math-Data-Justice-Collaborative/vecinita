name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: 'recursive'

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_CONFIG: .gitleaks.toml
        GITLEAKS_ENABLE_COMMENTS: "false"

  backend-ci:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        docker system prune -af || true

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    # Skip Playwright browser install for non-UI tests to save space
    - name: Skip Playwright browsers (no UI tests)
      run: echo "Playwright browser install skipped in CI"

    - name: Create .env file for tests
      working-directory: backend
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY || 'test-key' }}" >> .env
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY || 'test-groq-key' }}" >> .env
        echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY || 'test-deepseek-key' }}" >> .env
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env
        # Support either OPENAI_API_KEY or legacy OPEN_API_KEY via secrets
        if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env; fi
        if [ -n "${{ secrets.OPEN_API_KEY }}" ]; then echo "OPEN_API_KEY=${{ secrets.OPEN_API_KEY }}" >> .env; fi
      shell: bash

    - name: Run backend tests (unit only)
      working-directory: backend
      run: |
        pytest tests/ -m "unit and not llm" -v --tb=short --junit-xml=test-results.xml --cov=src --cov-report=xml --cov-report=html --cov-report=term
      env:
        PYTHONPATH: ${{ github.workspace }}/backend

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ubuntu-22.04-py3.10
        path: backend/test-results.xml

  backend-integration:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          graphviz \
          graphviz-dev \
          pkg-config

    - name: Install Python dependencies (lean CI)
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[ci]"

    - name: Create .env file for tests
      working-directory: backend
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}" >> .env
        echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY || 'test-key' }}" >> .env
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY || 'test-groq-key' }}" >> .env
        echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY || 'test-deepseek-key' }}" >> .env
        echo "DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://test' }}" >> .env
        echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
        echo "USE_LOCAL_EMBEDDINGS=true" >> .env
        echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
        echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
        echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
        echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env
      shell: bash

    - name: Run backend integration tests (non-DB/non-LLM)
      working-directory: backend
      run: |
        pytest tests/ -m "integration and not db and not llm" -v --tb=short --junit-xml=integration-test-results.xml
      env:
        PYTHONPATH: ${{ github.workspace }}/backend

    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-integration-results
        path: backend/integration-test-results.xml

  frontend-unit:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend unit tests
      working-directory: frontend
      run: npm run test -- --run

  frontend-e2e-smoke:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["chromium","firefox"]') || fromJSON('["chromium"]') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Playwright browser
      working-directory: frontend
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Start compose stack for e2e smoke
      run: docker compose -f docker-compose.dev.yml up -d frontend vecinita-gateway

    - name: Wait for frontend and gateway
      run: |
        for i in {1..40}; do
          curl -fsS http://127.0.0.1:15173 >/dev/null && curl -fsS http://127.0.0.1:18004/api/v1/ask/config >/dev/null && exit 0
          sleep 3
        done
        echo "Services did not become ready in time"
        docker compose -f docker-compose.dev.yml ps
        exit 1

    - name: Run frontend e2e smoke test
      working-directory: frontend
      env:
        CI: 'true'
        E2E_SKIP_WEBSERVER: 'true'
        E2E_BASE_URL: http://127.0.0.1:15173
      run: npx playwright test --project=${{ matrix.browser }} e2e/agent-config-connectivity.spec.ts

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: frontend/playwright-report

    - name: Dump compose logs on failure
      if: failure()
      run: docker compose -f docker-compose.dev.yml logs --no-color

    - name: Stop compose stack
      if: always()
      run: docker compose -f docker-compose.dev.yml down -v

  # ---------------------------------------------------------------------------
  # pgvector integration gate
  # Spins up a real Postgres 16 + pgvector container, runs DB migrations, then
  # executes every test marked `integration and db` (excluding LLM calls).
  # This closes the gap between mocked unit tests and a live Render Postgres DB.
  # ---------------------------------------------------------------------------
  backend-integration-pgvector:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vecinita
          POSTGRES_PASSWORD: vecinita
          POSTGRES_DB: vecinita_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vecinita:vecinita@localhost:5432/vecinita_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential graphviz graphviz-dev pkg-config postgresql-client

      - name: Install Python dependencies (lean CI)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Run DB migrations
        run: |
          bash backend/scripts/run_migrations.sh

      - name: Verify pgvector and schema
        run: |
          psql "$DATABASE_URL" -c "SELECT '[1,2,3]'::vector;" -c "\dt"

      - name: Create .env file for tests
        working-directory: backend
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" >> .env
          echo "SUPABASE_URL=https://test.supabase.co" >> .env
          echo "SUPABASE_KEY=test-key" >> .env
          echo "GROQ_API_KEY=test-groq-key" >> .env
          echo "DEEPSEEK_API_KEY=test-deepseek-key" >> .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "USE_LOCAL_EMBEDDINGS=true" >> .env
          echo "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2" >> .env
          echo "EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token" >> .env
          echo "REINDEX_TRIGGER_TOKEN=test-reindex-token" >> .env
          echo "REINDEX_SERVICE_URL=https://example.modal.run" >> .env

      - name: Run integration tests against pgvector DB
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          set +e
          pytest tests/ -m "integration and db and not llm" -v --tb=short \
            --junit-xml=integration-pgvector-results.xml
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No backend integration tests are currently marked with both 'integration' and 'db'; treating this as a no-op after successful schema verification."
            exit 0
          fi
          exit "$status"

      - name: Upload pgvector integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-pgvector-results
          path: backend/integration-pgvector-results.xml
