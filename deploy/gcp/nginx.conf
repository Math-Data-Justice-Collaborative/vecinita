# deploy/gcp/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse routing for Vecinita on GCP Compute Engine.
#
# Key features:
#   • Proxies /api/ → vecinita-agent:8000
#   • SSE streaming support (X-Accel-Buffering off, no routing buffering)
#   • HTTP → HTTPS redirect (once TLS is set up via certbot)
#   • Security headers
#   • Gzip for JSON/HTML
#   • Serves built frontend static files from /opt/vecinita/frontend/dist
#
# After certbot runs, it will insert ssl_certificate directives automatically.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream — gateway container listens on localhost:8004
upstream vecinita_gateway {
    server 127.0.0.1:8004;
    keepalive 64;
}

# ── HTTP (redirect to HTTPS when domain is configured) ─────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (uncomment once TLS is set up)
    # return 301 https://$host$request_uri;

    # ── Temporary: serve directly over HTTP until TLS is configured ──
    include /etc/nginx/snippets/vecinita-locations.conf;
}

