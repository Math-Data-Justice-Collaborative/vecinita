# Vecinita CI — per docs/test-plan.md §CI/CD (T13.1–T13.4)
name: CI

on:
  push:
    branches: [main, "phase/**", "feat/**"]
  pull_request:
    branches: [main, "phase/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: vecinita
          POSTGRES_PASSWORD: vecinita
          POSTGRES_DB: vecinita
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vecinita -d vecinita"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://vecinita:vecinita@localhost:5432/vecinita
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: ADR-007 — no DATABASE_URL in Modal worker code
        run: bash scripts/check_modal_no_database_url.sh

      - name: OpenAPI specs present
        run: bash scripts/check_openapi_specs.sh

      - name: Install ripgrep (secret pattern scan)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Secret patterns (current tree)
        run: bash scripts/check_secrets.sh

      - name: Operator DO specs not tracked
        run: bash scripts/check_no_operator_specs_tracked.sh

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar xz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks (current tree only)
        run: gitleaks detect --no-git --config .gitleaks.toml

      - name: Ruff lint
        run: uv run ruff check apps packages tests

      - name: Ruff format
        run: uv run ruff format --check apps packages tests

      - name: Basedpyright
        run: uv run basedpyright apps packages tests

      - name: Apply database migrations
        working-directory: apps/database
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest tests/unit tests/integration tests/privacy tests/e2e tests/smoke tests/eval

      - name: pip-audit (blocking)
        run: |
          IGNORE_ARGS=()
          while read -r cve; do
            [[ -z "$cve" || "$cve" =~ ^# ]] && continue
            IGNORE_ARGS+=(--ignore-vuln "$cve")
          done < audit/pip-audit-ignore.txt
          uv run pip-audit "${IGNORE_ARGS[@]}"

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - chat-rag-frontend
          - data-management-frontend
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install and verify
        run: |
          npm ci
          npm run lint
          npm test
