# docker-compose.render-local.yml
#
# Local Render-like development environment overlay.
#
# Mirrors the Render private-network hostname convention so local services
# use the same hostnames the production environment expects:
#   vecinita-modal-proxy-v1  →  port 10000  (model + embedding + jobs)
#   vecinita-agent           →  port 8000
#   vecinita-gateway         →  port 8004
#   vecinita-frontend        →  port 5173
#
# Usage:
#   docker compose -f docker-compose.render-local.yml up -d --build
#   ./scripts/local-render-check.sh
#
# Environment:
#   Copy .env.prod.render → .env.render-local and set RENDER=true before running.
#   The validator will also run against the env file:
#     python3 scripts/github/validate_render_env.py .env.render-local

x-render-network: &render-network
  networks:
    - vecinita-render-local

services:
  # -------------------------------------------------------------------------
  # Modal proxy stub — mirrors vecinita-modal-proxy-v1:10000
  # Nginx reverse proxy that routes:
  #   /model/*     → model-service:8000
  #   /embedding/* → embedding-service:8011
  #   /jobs/*      → scraper-service:8020
  # -------------------------------------------------------------------------
  modal-proxy:
    image: nginx:alpine
    container_name: vecinita-modal-proxy-v1
    volumes:
      - ./docker/render-local/nginx-modal-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "10000:10000"
    depends_on:
      - model-service
      - embedding-service
    <<: *render-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Model service — mirrors vecinita-modal-proxy-v1:10000/model
  # Uses the microservices model-service container locally.
  # -------------------------------------------------------------------------
  model-service:
    build:
      context: ./services/model-modal
      dockerfile: Dockerfile
    container_name: vecinita-model-ms-render
    environment:
      OLLAMA_HOST: http://vecinita-ollama-local:11434
      DEFAULT_MODEL: llama3.1:8b
    depends_on:
      - ollama
    <<: *render-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Embedding service — mirrors vecinita-modal-proxy-v1:10000/embedding
  # -------------------------------------------------------------------------
  embedding-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.embedding-modal
    container_name: vecinita-embedding-ms-render
    environment:
      PORT: "8011"
    <<: *render-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Ollama — local LLM backend behind the modal proxy
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: vecinita-ollama-local
    volumes:
      - ollama_data_render_local:/root/.ollama
    <<: *render-network

  # -------------------------------------------------------------------------
  # Agent — mirrors vecinita-agent Render service
  # -------------------------------------------------------------------------
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-agent
    env_file:
      - .env.render-local
    environment:
      RENDER: "true"
      RENDER_SERVICE_ID: "local-render-sim"
      AGENT_SERVICE_URL: "http://vecinita-agent:8000"
      MODAL_OLLAMA_ENDPOINT: "http://vecinita-modal-proxy-v1:10000/model"
      MODAL_EMBEDDING_ENDPOINT: "http://vecinita-modal-proxy-v1:10000/embedding"
      OLLAMA_BASE_URL: "http://vecinita-modal-proxy-v1:10000/model"
      EMBEDDING_SERVICE_URL: "http://vecinita-modal-proxy-v1:10000/embedding"
      AGENT_ENFORCE_PROXY: "true"
      RENDER_REMOTE_INFERENCE_ONLY: "true"
    depends_on:
      modal-proxy:
        condition: service_healthy
    ports:
      - "8000:8000"
    <<: *render-network

  # -------------------------------------------------------------------------
  # Gateway — mirrors vecinita-gateway Render service
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-gateway
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8004
    env_file:
      - .env.render-local
    environment:
      RENDER: "true"
      AGENT_SERVICE_URL: "http://vecinita-agent:8000"
    depends_on:
      - agent
    ports:
      - "8004:8004"
    <<: *render-network

  # -------------------------------------------------------------------------
  # Frontend — mirrors vecinita-frontend:5173
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vecinita-frontend
    environment:
      VITE_GATEWAY_URL: "http://localhost:8004"
      VITE_BACKEND_URL: "http://localhost:8004"
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    <<: *render-network

networks:
  vecinita-render-local:
    name: vecinita-render-local
    driver: bridge

volumes:
  ollama_data_render_local:
