name: Multi-Repo Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      deploy_chat_frontend:
        description: Dispatch chat frontend deployment workflow
        required: false
        default: true
        type: boolean
      deploy_data_management_frontend:
        description: Dispatch data-management frontend deployment workflow
        required: false
        default: true
        type: boolean
      deploy_data_management_api:
        description: Dispatch data-management API deployment workflow
        required: false
        default: true
        type: boolean
      deploy_scraper:
        description: Dispatch scraper deployment workflow
        required: false
        default: true
        type: boolean
      deploy_embedding_modal:
        description: Dispatch embedding-modal deployment workflow
        required: false
        default: true
        type: boolean
      deploy_model_modal:
        description: Dispatch model-modal deployment workflow
        required: false
        default: true
        type: boolean
      target_ref:
        description: Ref to deploy in all target repos
        required: false
        default: main
        type: string
      wait_for_completion:
        description: Wait for each remote workflow completion
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  workflow-context:
    runs-on: ubuntu-22.04
    outputs:
      has_cross_repo_token: ${{ steps.detect.outputs.has_cross_repo_token }}
      services_json: ${{ steps.select-services.outputs.services_json }}
      service_count: ${{ steps.select-services.outputs.service_count }}
    steps:
      - name: Detect cross-repo token availability
        id: detect
        env:
          HAS_CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN != '' }}
        run: echo "has_cross_repo_token=${HAS_CROSS_REPO_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select services from canonical release manifest
        id: select-services
        env:
          DEPLOY_CHAT_FRONTEND: ${{ inputs.deploy_chat_frontend }}
          DEPLOY_DATA_MANAGEMENT_FRONTEND: ${{ inputs.deploy_data_management_frontend }}
          DEPLOY_DATA_MANAGEMENT_API: ${{ inputs.deploy_data_management_api }}
          DEPLOY_SCRAPER: ${{ inputs.deploy_scraper }}
          DEPLOY_EMBEDDING_MODAL: ${{ inputs.deploy_embedding_modal }}
          DEPLOY_MODEL_MODAL: ${{ inputs.deploy_model_modal }}
        run: |
          MANIFEST=".github/release/release-manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "Missing canonical release manifest: $MANIFEST"
            exit 1
          fi

          SERVICES_JSON=$(jq -c \
            --argjson chat "$DEPLOY_CHAT_FRONTEND" \
            --argjson dmf "$DEPLOY_DATA_MANAGEMENT_FRONTEND" \
            --argjson dma "$DEPLOY_DATA_MANAGEMENT_API" \
            --argjson scraper "$DEPLOY_SCRAPER" \
            --argjson embedding "$DEPLOY_EMBEDDING_MODAL" \
            --argjson model "$DEPLOY_MODEL_MODAL" \
            '[
              .services[]
              | select(
                  (.workflow_dispatch_input != "deploy_chat_frontend" or $chat)
                  and (.workflow_dispatch_input != "deploy_data_management_frontend" or $dmf)
                  and (.workflow_dispatch_input != "deploy_data_management_api" or $dma)
                  and (.workflow_dispatch_input != "deploy_scraper" or $scraper)
                  and (.workflow_dispatch_input != "deploy_embedding_modal" or $embedding)
                  and (.workflow_dispatch_input != "deploy_model_modal" or $model)
                )
            ]' \
            "$MANIFEST")

          SERVICE_COUNT=$(echo "$SERVICES_JSON" | jq 'length')
          echo "services_json=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "service_count=$SERVICE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Selected $SERVICE_COUNT service(s) for dispatch"

  dispatch-services:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && needs.workflow-context.outputs.service_count != '0'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.workflow-context.outputs.services_json) }}
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: ${{ matrix.service.id }}
      target_repo: ${{ matrix.service.target_repo }}
      workflow_file: ${{ matrix.service.workflow_file }}
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: ${{ matrix.service.expected_platform }}
      expected_region: ${{ matrix.service.expected_region }}
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  orchestrator-summary:
    if: always()
    needs:
      - workflow-context
      - dispatch-services
    runs-on: ubuntu-22.04
    steps:
      - name: Print dispatch summary
        run: |
          echo "cross-repo-token: ${{ needs.workflow-context.outputs.has_cross_repo_token }}"
          echo "selected-services: ${{ needs.workflow-context.outputs.service_count }}"
          echo "dispatch-services: ${{ needs.dispatch-services.result }}"

      - name: Fail orchestrator on child workflow failure
        run: |
          RESULTS="${{ needs.dispatch-services.result }}"
          if echo "$RESULTS" | grep -Eq "failure|cancelled|timed_out"; then
            echo "At least one downstream service workflow failed."
            exit 1
          fi
