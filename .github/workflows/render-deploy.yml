name: Render Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "backend/**"
      - "frontend/**"
      - "render.yaml"
      - "render.staging.yaml"
      - ".github/workflows/render-deploy.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout contract test submodules
        run: git submodule update --init --depth 1 services/embedding-modal services/model-modal

      - name: Validate shared Render env contract
        run: python3 scripts/github/validate_render_env.py .env.prod.render

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend CI dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Lint backend (Ruff)
        working-directory: backend
        run: python -m ruff check src tests

      - name: Check backend formatting (Black)
        working-directory: backend
        run: python -m black --check src tests

      - name: Type check backend (mypy)
        working-directory: backend
        run: python -m mypy src

      - name: Run backend fast tests (non-LLM)
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          EMBEDDING_STRICT_STARTUP: 'false'
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test-key
          DATABASE_URL=postgresql://test
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=llama3.1:8b
          USE_LOCAL_EMBEDDINGS=true
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
          EMBEDDING_SERVICE_AUTH_TOKEN=test-embed-token
          EMBEDDING_STRICT_STARTUP=false
          REINDEX_TRIGGER_TOKEN=test-reindex-token
          REINDEX_SERVICE_URL=https://example.modal.run
          EOF
          pytest tests/ -m "not integration and not e2e and not llm" -v --tb=short --junit-xml=test-results.xml

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout frontend submodule
        run: git submodule update --init --depth 1 frontend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint -- --quiet

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage:unit

  deploy-staging:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: staging
    env:
      RENDER_STAGING_DEPLOY_HOOK_AGENT: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_AGENT }}
      RENDER_STAGING_DEPLOY_HOOK_GATEWAY: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_GATEWAY }}
      RENDER_STAGING_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_FRONTEND }}
    steps:
      - name: Trigger staging agent deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_AGENT != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_AGENT" || echo "::notice::Staging agent deploy hook request failed."

      - name: Trigger staging gateway deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_GATEWAY != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_GATEWAY" || echo "::notice::Staging gateway deploy hook request failed."

      - name: Trigger staging frontend deploy hook
        if: ${{ env.RENDER_STAGING_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsSL -X POST "$RENDER_STAGING_DEPLOY_HOOK_FRONTEND" || echo "::notice::Staging frontend deploy hook request failed."

      - name: Verify required staging deploy hooks are configured
        run: |
          missing=0
          for key in \
            RENDER_STAGING_DEPLOY_HOOK_AGENT \
            RENDER_STAGING_DEPLOY_HOOK_GATEWAY \
            RENDER_STAGING_DEPLOY_HOOK_FRONTEND; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required staging deploy hook: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Staging deploy hook validation failed. Configure all required hooks."
            exit 1
          fi

  smoke-staging:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    needs: [deploy-staging]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_STAGING_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_STAGING_AGENT_URL }}
      GATEWAY_URL: ${{ secrets.RENDER_STAGING_GATEWAY_URL }}
    steps:
      - name: Wait for staging services to stabilise
        run: sleep 45

      - name: Smoke staging services
        run: |
          missing=0
          for key in FRONTEND_URL AGENT_URL GATEWAY_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required staging smoke URL: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_url "Agent health" "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_url "Gateway health" "$GATEWAY_URL/health"
          check_url "Gateway documents tags" "$GATEWAY_URL/api/v1/documents/tags?limit=5"

  deploy-production:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: [backend-quality, frontend-quality]
    environment: production
    env:
      RENDER_PROD_DEPLOY_HOOK_AGENT: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_AGENT || secrets.RENDER_DEPLOY_HOOK_AGENT || secrets.RENDER_VECINITA_AGENT_DEPLOY_HOOK }}
      RENDER_PROD_DEPLOY_HOOK_GATEWAY: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_GATEWAY || secrets.RENDER_DEPLOY_HOOK_GATEWAY || secrets.RENDER_VECINITA_GATEWAY_DEPLOY_HOOK }}
      RENDER_PROD_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_FRONTEND || secrets.RENDER_DEPLOY_HOOK_FRONTEND || secrets.RENDER_VECINITA_FRONTEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger production agent deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_AGENT != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_AGENT" || echo "::notice::Production agent deploy hook request failed."

      - name: Trigger production gateway deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_GATEWAY != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_GATEWAY" || echo "::notice::Production gateway deploy hook request failed."

      - name: Trigger production frontend deploy hook
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsSL -X POST "$RENDER_PROD_DEPLOY_HOOK_FRONTEND" || echo "::notice::Production frontend deploy hook request failed."

      - name: Verify required production deploy hooks are configured
        run: |
          missing=0
          for key in \
            RENDER_PROD_DEPLOY_HOOK_AGENT \
            RENDER_PROD_DEPLOY_HOOK_GATEWAY \
            RENDER_PROD_DEPLOY_HOOK_FRONTEND; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required production deploy hook: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Production deploy hook validation failed. Configure all required hooks."
            exit 1
          fi

  smoke-production:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: [deploy-production]
    timeout-minutes: 10
    env:
      FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}
      AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL }}
      GATEWAY_URL: ${{ secrets.RENDER_PROD_GATEWAY_URL || secrets.RENDER_GATEWAY_URL }}
    steps:
      - name: Wait for production services to stabilise
        run: sleep 45

      - name: Smoke production services
        run: |
          missing=0
          for key in FRONTEND_URL AGENT_URL GATEWAY_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required production smoke URL: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          check_url() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "[skip] $name URL is not configured"
              return 0
            fi
            echo "[probe] $url"
            status=$(curl -o /dev/null -s -w "%{http_code}" --retry 4 --retry-delay 10 --retry-all-errors --max-time 30 "$url")
            echo "[result] $name HTTP $status"
            if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
              echo "[fail] $name probe failed"
              exit 1
            fi
          }

          check_url "Frontend health" "$FRONTEND_URL/health"
          check_url "Agent health" "$AGENT_URL/health"
          check_url "Agent config" "$AGENT_URL/api/v1/ask/config"
          check_url "Gateway health" "$GATEWAY_URL/health"
          check_url "Gateway documents tags" "$GATEWAY_URL/api/v1/documents/tags?limit=5"

  deploy-wait:
    name: Wait for deploys to reach live
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: [deploy-production]
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - name: agent
            secret_var: RENDER_AGENT_SERVICE_ID
          - name: gateway
            secret_var: RENDER_GATEWAY_SERVICE_ID
          - name: frontend
            secret_var: RENDER_FRONTEND_SERVICE_ID
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ${{ matrix.name }} deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets[matrix.secret_var] }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$SERVICE_ID" ]; then
            echo "::notice::RENDER_API_KEY or ${{ matrix.secret_var }} not set — skipping deploy wait"
            exit 0
          fi
          python3 scripts/github/wait_for_render_deploy.py "$SERVICE_ID" --timeout 900 --interval 30

  post-deploy-smoke:
    name: Post-deploy live smoke tests
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: [deploy-wait]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      RENDER_GATEWAY_URL: ${{ secrets.RENDER_GATEWAY_URL }}
      RENDER_AGENT_URL: ${{ secrets.RENDER_PROD_AGENT_URL || secrets.RENDER_AGENT_URL }}
      RENDER_FRONTEND_URL: ${{ secrets.RENDER_PROD_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Wait 5 minutes post-deploy stabilisation
        run: sleep 300

      - name: Run live health smoke tests
        run: uv run pytest tests/live/ -m live --timeout=120 -v --tb=short --junit-xml=live-smoke-results.xml || true
        # `|| true` so we always upload the artifact even on failure

      - name: Upload live smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-results
          path: backend/live-smoke-results.xml
          if-no-files-found: ignore
