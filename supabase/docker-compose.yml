version: '3.8'

# Local Supabase Test Environment
# This is a SIMPLIFIED version for testing only
# Does NOT include all Supabase features (Auth, Storage, Realtime, etc.)

services:
  # PostgreSQL Database (Test) - with pgvector extension
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: vecinita-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8 --encoding=UTF8"
    ports:
      - "54321:5432"  # Different port to avoid conflict with production
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init-local-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    networks:
      - supabase-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgREST - REST API on PostgreSQL (Test)
  postgrest-test:
    image: postgrest/postgrest:v12.0.1
    container_name: vecinita-postgrest-test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@postgres-test:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: test-jwt-secret-for-local-testing-only-32chars-minimum-length
      PGRST_JWT_AUD: ""
      PGRST_JWT_ROLE_CLAIM_KEY: ".role"
    ports:
      - "3001:3000"  # PostgREST REST API
    restart: unless-stopped
    networks:
      - supabase-test-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # pgAdmin - Database Management UI (Test)
  pgadmin-test:
    image: dpage/pgadmin4:latest
    container_name: vecinita-pgadmin-test
    depends_on:
      - postgres-test
    environment:
      PGADMIN_DEFAULT_EMAIL: test@example.com
      PGADMIN_DEFAULT_PASSWORD: test123
    ports:
      - "5051:80"  # Different port to avoid conflict
    restart: unless-stopped
    networks:
      - supabase-test-network

networks:
  supabase-test-network:
    driver: bridge

volumes:
  postgres_test_data:
    driver: local
