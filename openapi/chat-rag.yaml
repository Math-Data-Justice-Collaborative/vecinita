openapi: 3.0.3
info:
  title: Vecinita ChatRAG API
  version: 0.1.0
  description: Bilingual community Q&A (stateless; no identity fields in request bodies).
servers:
  - url: /api/v1
    description: ChatRAG backend (DigitalOcean)
paths:
  /ask:
    post:
      operationId: ask
      summary: Non-streaming bilingual Q&A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Answer with retrieval sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /ask/stream:
    post:
      operationId: askStream
      summary: Streaming answer (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: Server-sent events (`token`, `sources`, `done`)
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /health:
    get:
      operationId: health
      summary: Service health
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    AskRequest:
      type: object
      additionalProperties: false
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
    Source:
      type: object
      required:
        - chunk_id
        - document_id
        - score
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        score:
          type: number
          format: float
    AskResponse:
      type: object
      required:
        - answer
        - language
        - sources
      properties:
        answer:
          type: string
        language:
          type: string
          enum:
            - en
            - es
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
    HealthResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
        dependencies:
          type: object
          additionalProperties:
            type: string
          example:
            postgres: ok
            modal_embed: ok
            modal_llm: ok
    ErrorBody:
      type: object
      properties:
        detail:
          type: string
  responses:
    ValidationError:
      description: Validation or forbidden identity fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: Upstream dependency unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
