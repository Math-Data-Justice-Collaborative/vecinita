# Continuous deployment of Modal apps (ADR-002 hybrid: Modal workers + DO control plane).
# Deploys embedding (CPU), data-management (ASGI / data path), and llm (GPU / T4) to the
# vecinita workspace. Triggered only after Deploy preflight passes on main (which requires CI).
#
# EV-007 redeploy order: Supabase config/migrations push runs in the `supabase-sync` job
# before Modal deploy. DigitalOcean deploy chains after this workflow completes.
# Resend SMTP is applied via Supabase `config push` (SUPABASE_SMTP_PASS); Resend REST
# test-send uses Modal operator secrets (RESEND_API_KEY) — synced in the deploy job when
# GitHub secrets are configured via sync_github_secrets.sh.
#
# Pattern: https://modal.com/docs/guide/continuous-deployment
name: Deploy Modal

on:
  workflow_run:
    workflows: ["Deploy preflight"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Never cancel an in-progress deploy; serialize redeploys instead.
concurrency:
  group: deploy-modal
  cancel-in-progress: false

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF: cfuvghdsuwactfeamtym
  # Pinned Supabase CLI — same constraint as supabase.yml (ADR-030 §8).
  SUPABASE_CLI_VERSION: "2.84.2"

jobs:
  supabase-sync:
    runs-on: ubuntu-latest
    # Deploy preflight runs only after CI succeeds on main; manual dispatch skips the chain.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SMTP_PASS: ${{ secrets.SUPABASE_SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect Supabase access token
        id: supabase_token
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN not configured — skipping Supabase sync"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.supabase_token.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push Supabase config, templates, and migrations
        if: steps.supabase_token.outputs.skip != 'true'
        run: bash scripts/supabase/ci_sync.sh sync-production

  deploy:
    runs-on: ubuntu-latest
    needs: supabase-sync
    # Deploy preflight succeeded on main (which required CI success).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_SENDER_EMAIL: ${{ secrets.RESEND_SENDER_EMAIL }}
      VECINITA_INTERNAL_API_KEY: ${{ secrets.VECINITA_INTERNAL_API_KEY }}
      VECINITA_MODAL_PROXY_KEY: ${{ secrets.VECINITA_MODAL_PROXY_KEY }}
      VECINITA_MODAL_EMBED_URL: ${{ secrets.VECINITA_MODAL_EMBED_URL }}
      VECINITA_MODAL_LLM_URL: ${{ secrets.VECINITA_MODAL_LLM_URL }}
      VECINITA_MODAL_DATA_MGMT_URL: ${{ secrets.VECINITA_MODAL_DATA_MGMT_URL }}
      VECINITA_INTERNAL_WRITE_URL: ${{ secrets.VECINITA_INTERNAL_WRITE_URL }}
      VECINITA_ADMIN_FRONTEND_URL: ${{ secrets.VECINITA_ADMIN_FRONTEND_URL }}
      VECINITA_CHAT_FRONTEND_URL: ${{ secrets.VECINITA_CHAT_FRONTEND_URL }}
      VECINITA_CORS_ORIGINS: ${{ secrets.VECINITA_CORS_ORIGINS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Require Modal tokens
        run: |
          if [ -z "${MODAL_TOKEN_ID}" ] || [ -z "${MODAL_TOKEN_SECRET}" ]; then
            echo "::error::MODAL_TOKEN_ID / MODAL_TOKEN_SECRET repo secrets are not set." >&2
            echo "Add them under Settings -> Secrets and variables -> Actions." >&2
            echo "See https://modal.com/docs/guide/continuous-deployment" >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: pip install 'modal>=1.2.6,<2'

      - name: Build smoke (uv sync + Modal app import)
        run: bash scripts/deploy/verify_build.sh

      - name: Verify Modal secrets and volumes
        run: bash scripts/deploy/verify_secrets.sh

      - name: Materialize deploy env from GitHub secrets
        run: bash scripts/deploy/ci_materialize_env.sh

      - name: Sync Modal vecinita-data-management secret
        run: |
          set -euo pipefail
          if bash scripts/deploy/ci_materialize_env.sh --check modal; then
            bash scripts/deploy/sync_modal_secret.sh --merge --apply
          else
            echo "::warning::Modal deploy env incomplete — skipping secret sync. Push secrets via sync_github_secrets.sh --apply"
          fi

      - name: Deploy Modal apps (embedding, data-management, llm)
        run: bash scripts/deploy/modal.sh

      - name: List deployed apps
        run: modal app list
