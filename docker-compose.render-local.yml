# docker-compose.render-local.yml
#
# Local Render-like development environment overlay.
#
# Mirrors a Render-like local network using direct service hostnames.
#
# Usage:
#   docker compose -f docker-compose.render-local.yml up -d --build
#   ./scripts/local-render-check.sh
#
# Environment:
#   Copy .env.prod.render → .env.render-local and set RENDER=true before running.
#   The validator will also run against the env file:
#     python3 scripts/github/validate_render_env.py .env.render-local

x-render-network: &render-network
  networks:
    - vecinita-render-local

services:
  # -------------------------------------------------------------------------
  # Model service
  # Uses the microservices model-service container locally.
  # -------------------------------------------------------------------------
  model-service:
    build:
      context: ./services/model-modal
      dockerfile: Dockerfile
    container_name: vecinita-model-ms-render
    environment:
      OLLAMA_HOST: http://vecinita-ollama-local:11434
      DEFAULT_MODEL: llama3.1:8b
    depends_on:
      - ollama
    <<: *render-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Embedding service
  # -------------------------------------------------------------------------
  embedding-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.embedding-modal
    container_name: vecinita-embedding-ms-render
    environment:
      PORT: "8011"
    <<: *render-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Ollama — local LLM backend
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: vecinita-ollama-local
    volumes:
      - ollama_data_render_local:/root/.ollama
    <<: *render-network

  # -------------------------------------------------------------------------
  # Agent — mirrors vecinita-agent Render service
  # -------------------------------------------------------------------------
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-agent
    env_file:
      - .env.render-local
    environment:
      RENDER: "true"
      RENDER_SERVICE_ID: "local-render-sim"
      AGENT_SERVICE_URL: "http://vecinita-agent:8000"
      MODAL_OLLAMA_ENDPOINT: "http://vecinita-model-ms-render:8000"
      MODAL_EMBEDDING_ENDPOINT: "http://vecinita-embedding-ms-render:8011"
      OLLAMA_BASE_URL: "http://vecinita-model-ms-render:8000"
      EMBEDDING_SERVICE_URL: "http://vecinita-embedding-ms-render:8011"
      RENDER_REMOTE_INFERENCE_ONLY: "true"
    depends_on:
      model-service:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    <<: *render-network

  # -------------------------------------------------------------------------
  # Gateway — mirrors vecinita-gateway Render service
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vecinita-gateway
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8004
    env_file:
      - .env.render-local
    environment:
      RENDER: "true"
      AGENT_SERVICE_URL: "http://vecinita-agent:8000"
    depends_on:
      - agent
    ports:
      - "8004:8004"
    <<: *render-network

  # -------------------------------------------------------------------------
  # Frontend — mirrors vecinita-frontend:5173
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vecinita-frontend
    environment:
      VITE_GATEWAY_URL: "http://localhost:8004"
      VITE_BACKEND_URL: "http://localhost:8004"
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    <<: *render-network

networks:
  vecinita-render-local:
    name: vecinita-render-local
    driver: bridge

volumes:
  ollama_data_render_local:
