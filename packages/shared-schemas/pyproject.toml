[project]
name = "vecinita-shared-schemas"
version = "0.1.0"
description = "Shared Pydantic models aligned with OpenAPI contracts"
requires-python = ">=3.11,<3.12"
dependencies = [
    "cryptography>=46.0.6",
    "fastapi>=0.115,<1",
    "pydantic>=2.7,<3",
    "PyJWT>=2.10,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_shared_schemas"]
