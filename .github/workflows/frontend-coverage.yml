name: Frontend Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-coverage.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-coverage.yml'
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend tests with coverage
      working-directory: frontend
      run: npm run test:coverage -- --run

    - name: Summarize coverage
      working-directory: frontend
      run: |
        node -e "const fs=require('fs');const summary=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));const pct=summary?.total?.lines?.pct ?? 0;const out='Frontend line coverage: '+Number(pct).toFixed(2)+'%\\n';process.stdout.write(out);fs.writeFileSync('coverage-summary.txt', out);"

    - name: Upload frontend coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage
        path: |
          frontend/coverage
          frontend/coverage-summary.txt
