services:
  postgres:
    image: postgres:16-alpine
    container_name: vecinita-postgres-ms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "8543:5432"
    volumes:
      - postgres_data_ms:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vecinita-ms-net

  ollama:
    image: ollama/ollama:latest
    container_name: vecinita-ollama-ms
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_ms:/root/.ollama
    networks:
      - vecinita-ms-net

  model-service:
    build:
      context: ./modal-apps/model-modal
      dockerfile: Dockerfile
    container_name: vecinita-model-ms
    environment:
      OLLAMA_HOST: http://vecinita-ollama-ms:11434
      DEFAULT_MODEL: llama3.2
    ports:
      - "8008:8000"
    depends_on:
      - ollama
    networks:
      - vecinita-ms-net

  embedding-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.embedding-modal
    container_name: vecinita-embedding-ms
    ports:
      - "8011:8011"
    networks:
      - vecinita-ms-net

  scraper-service:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.scraper-service
    container_name: vecinita-scraper-ms
    environment:
      SERVICE_AUTH_ENABLED: "false"
      DATABASE_URL: postgresql://postgres:postgres@vecinita-postgres-ms:5432/postgres
      EMBEDDING_UPSTREAM_URL: http://vecinita-embedding-ms:8011
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_started
    networks:
      - vecinita-ms-net

  chat-agent:
    build:
      context: .
      dockerfile: apis/agent/Dockerfile
    container_name: vecinita-chat-agent-ms
    command: ["sh", "-c", "uvicorn src.agent.main:app --host 0.0.0.0 --port 8000"]
    environment:
      PORT: 8000
      OLLAMA_BASE_URL: http://vecinita-model-ms:8000
      EMBEDDING_UPSTREAM_URL: http://vecinita-embedding-ms:8011
      DATABASE_URL: postgresql://postgres:postgres@vecinita-postgres-ms:5432/postgres
      DEFAULT_PROVIDER: ollama
      OLLAMA_MODEL: llama3.2
      EMBEDDING_STRICT_STARTUP: "false"
    ports:
      - "8000:8000"
    depends_on:
      - model-service
      - embedding-service
      - postgres
    networks:
      - vecinita-ms-net

  chat-gateway:
    build:
      context: .
      dockerfile: apis/gateway/Dockerfile.gateway
    container_name: vecinita-chat-gateway-ms
    command: ["sh", "-c", "uvicorn src.api.main:app --host 0.0.0.0 --port 8004"]
    environment:
      PORT: 8004
      AGENT_SERVICE_URL: http://vecinita-chat-agent-ms:8000
      EMBEDDING_UPSTREAM_URL: http://vecinita-embedding-ms:8011
      DATABASE_URL: postgresql://postgres:postgres@vecinita-postgres-ms:5432/postgres
      DEV_ADMIN_ENABLED: "true"
      DEV_ADMIN_BEARER_TOKEN: vecinita-dev-admin-token-2026
      REINDEX_SERVICE_URL: http://vecinita-scraper-ms:8020/jobs
      REINDEX_TRIGGER_TOKEN: ""
    ports:
      - "8004:8004"
    depends_on:
      - chat-agent
    networks:
      - vecinita-ms-net

  chat-frontend:
    build:
      context: ./frontends/chat
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: http://localhost:8004/api/v1
        VITE_BACKEND_URL: http://localhost:8000
    container_name: vecinita-chat-frontend-ms
    ports:
      - "5173:5173"
    depends_on:
      - chat-gateway
    networks:
      - vecinita-ms-net

  data-manager-frontend:
    build:
      context: .
      dockerfile: docker/microservices/Dockerfile.data-management-frontend
    container_name: vecinita-data-manager-frontend-ms
    ports:
      - "4173:4173"
    depends_on:
      - chat-gateway
    networks:
      - vecinita-ms-net

volumes:
  postgres_data_ms:
  ollama_data_ms:

networks:
  vecinita-ms-net:
    driver: bridge
