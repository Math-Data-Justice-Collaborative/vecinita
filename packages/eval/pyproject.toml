[project]
name = "vecinita-eval"
version = "0.1.0"
description = "Golden-set RAG evaluation harness (F36)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "llama-index>=0.13.0,<0.14",
    "vecinita-rag",
    "vecinita-shared-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vecinita_eval"]

[tool.uv.sources]
vecinita-rag = { workspace = true }
vecinita-shared-schemas = { workspace = true }
