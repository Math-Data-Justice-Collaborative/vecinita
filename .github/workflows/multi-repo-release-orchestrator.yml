name: Multi-Repo Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      deploy_chat_frontend:
        description: Dispatch chat frontend deployment workflow
        required: false
        default: true
        type: boolean
      deploy_data_management_frontend:
        description: Dispatch data-management frontend deployment workflow
        required: false
        default: true
        type: boolean
      deploy_data_management_api:
        description: Dispatch data-management API deployment workflow
        required: false
        default: true
        type: boolean
      deploy_scraper:
        description: Dispatch scraper deployment workflow
        required: false
        default: true
        type: boolean
      deploy_embedding_modal:
        description: Dispatch embedding-modal deployment workflow
        required: false
        default: true
        type: boolean
      deploy_model_modal:
        description: Dispatch model-modal deployment workflow
        required: false
        default: true
        type: boolean
      target_ref:
        description: Ref to deploy in all target repos
        required: false
        default: main
        type: string
      wait_for_completion:
        description: Wait for each remote workflow completion
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  workflow-context:
    runs-on: ubuntu-22.04
    outputs:
      has_cross_repo_token: ${{ steps.detect.outputs.has_cross_repo_token }}
    steps:
      - name: Detect cross-repo token availability
        id: detect
        env:
          HAS_CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN != '' }}
        run: echo "has_cross_repo_token=${HAS_CROSS_REPO_TOKEN}" >> "$GITHUB_OUTPUT"

  chat-frontend:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_chat_frontend
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: chat-frontend
      target_repo: joseph-c-mcguire/Vecinitafrontend
      workflow_file: deploy.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Render Frontend
      expected_region: virginia
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  data-management-frontend:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_data_management_frontend
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: data-management-frontend
      target_repo: Math-Data-Justice-Collaborative/vecinita-data-management-frontend
      workflow_file: deploy.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Render Frontend
      expected_region: virginia
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  data-management-api:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_data_management_api
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: data-management-api
      target_repo: Math-Data-Justice-Collaborative/vecinita-data-management
      workflow_file: deploy.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Render Web Service (CORS-restricted)
      expected_region: virginia
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  scraper:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_scraper
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: scraper
      target_repo: Math-Data-Justice-Collaborative/vecinita-scraper
      workflow_file: ci-cd.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Modal Deploy
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  embedding-modal:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_embedding_modal
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: embedding-modal
      target_repo: Math-Data-Justice-Collaborative/vecinita-embedding
      workflow_file: deploy.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Modal Deploy
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  model-modal:
    needs: [workflow-context]
    if: needs.workflow-context.outputs.has_cross_repo_token == 'true' && inputs.deploy_model_modal
    uses: ./.github/workflows/reusable-dispatch-repo-workflow.yml
    with:
      service_name: model-modal
      target_repo: Math-Data-Justice-Collaborative/vecinita-model
      workflow_file: deploy.yml
      target_ref: ${{ inputs.target_ref }}
      wait_for_completion: ${{ inputs.wait_for_completion }}
      expected_platform: Modal Deploy
    secrets:
      dispatch_token: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}

  orchestrator-summary:
    if: always()
    needs:
      - workflow-context
      - chat-frontend
      - data-management-frontend
      - data-management-api
      - scraper
      - embedding-modal
      - model-modal
    runs-on: ubuntu-22.04
    steps:
      - name: Print dispatch summary
        run: |
          echo "cross-repo-token: ${{ needs.workflow-context.outputs.has_cross_repo_token }}"
          echo "chat-frontend: ${{ needs.chat-frontend.result }}"
          echo "data-management-frontend: ${{ needs.data-management-frontend.result }}"
          echo "data-management-api: ${{ needs.data-management-api.result }}"
          echo "scraper: ${{ needs.scraper.result }}"
          echo "embedding-modal: ${{ needs.embedding-modal.result }}"
          echo "model-modal: ${{ needs.model-modal.result }}"

      - name: Fail orchestrator on child workflow failure
        run: |
          RESULTS="${{ needs.chat-frontend.result }} ${{ needs.data-management-frontend.result }} ${{ needs.data-management-api.result }} ${{ needs.scraper.result }} ${{ needs.embedding-modal.result }} ${{ needs.model-modal.result }}"
          if echo "$RESULTS" | grep -Eq "failure|cancelled|timed_out"; then
            echo "At least one downstream service workflow failed."
            exit 1
          fi
