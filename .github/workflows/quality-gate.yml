name: Quality Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend CI dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[ci]"

      - name: Lint backend (Ruff)
        working-directory: backend
        run: python -m ruff check src tests

      - name: Check backend formatting (Black)
        working-directory: backend
        run: python -m black --check src tests

      - name: Type check backend (mypy)
        working-directory: backend
        run: python -m mypy src

  frontend-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

  auth-quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install auth dependencies
        working-directory: auth
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ".[dev]"

      - name: Lint auth service (Ruff)
        working-directory: auth
        run: ruff check src tests

      - name: Check auth formatting (Black)
        working-directory: auth
        run: black --check src tests

      - name: Run auth tests with coverage
        working-directory: auth
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key
          JWT_SECRET: test-jwt-secret
        run: pytest tests/ --cov=src --cov-fail-under=98
