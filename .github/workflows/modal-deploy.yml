name: Modal Deployment

on:
  push:
    branches:
      - main
    paths:
      - "services/embedding-modal/**"
      - "services/model-modal/**"
      - "services/scraper/**"
      - "backend/src/scraper/modal_app.py"
      - ".github/workflows/modal-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_embedding:
        description: "Deploy embedding service (services/embedding-modal)"
        required: false
        default: "true"
      deploy_model:
        description: "Deploy model service (services/model-modal)"
        required: false
        default: "true"
      deploy_scraper:
        description: "Deploy scraper workers + API (services/scraper)"
        required: false
        default: "true"

concurrency:
  group: modal-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  modal-deploy:
    name: Deploy to Modal
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID || secrets.MODAL_API_TOKEN_ID || secrets.MODAL_AUTH_KEY }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET || secrets.MODAL_API_TOKEN_SECRET || secrets.MODAL_AUTH_SECRET }}
      MODAL_PROFILE: ${{ secrets.MODAL_API_PROFILE || vars.MODAL_API_PROFILE || 'vecinita' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Init service submodules
        run: |
          git submodule update --init --depth 1 \
            services/embedding-modal \
            services/model-modal \
            services/scraper

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Verify Modal Authentication
        id: modal_auth
        shell: bash
        run: |
          token_id="$(printf '%s' "$MODAL_TOKEN_ID" | tr -d '\r\n')"
          token_secret="$(printf '%s' "$MODAL_TOKEN_SECRET" | tr -d '\r\n')"
          modal_profile="$(printf '%s' "${MODAL_PROFILE:-vecinita}" | tr -d '\r\n')"

          if [ -z "$token_id" ] || [ -z "$token_secret" ]; then
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Modal deployment skipped: set MODAL_TOKEN_ID and MODAL_TOKEN_SECRET (or MODAL_API_TOKEN_*, or MODAL_AUTH_*)."
            exit 0
          fi

          if modal token set --profile "$modal_profile" --token-id "$token_id" --token-secret "$token_secret" --no-verify && MODAL_PROFILE="$modal_profile" modal token info >/dev/null 2>&1; then
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
            echo "✓ Modal authentication verified"
          else
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Modal deployment skipped because authentication failed. Configure repo secrets MODAL_TOKEN_ID and MODAL_TOKEN_SECRET (or MODAL_API_TOKEN_ID / MODAL_API_TOKEN_SECRET, or MODAL_AUTH_KEY / MODAL_AUTH_SECRET)."
          fi

      - name: Deploy embedding Modal app
        if: steps.modal_auth.outputs.authenticated == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_embedding == 'true')
        run: |
          echo "Deploying services/embedding-modal..."
          modal deploy services/embedding-modal/src/vecinita/app.py
          echo "✓ Embedding Modal app deployed"

      - name: Deploy model Modal app
        if: steps.modal_auth.outputs.authenticated == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_model == 'true')
        run: |
          echo "Deploying services/model-modal..."
          modal deploy services/model-modal/src/vecinita/app.py
          echo "✓ Model Modal app deployed"

      - name: Deploy scraper Modal apps
        if: steps.modal_auth.outputs.authenticated == 'true' && (github.event_name == 'push' || github.event.inputs.deploy_scraper == 'true')
        run: |
          echo "Deploying services/scraper (workers + API)..."
          modal deploy services/scraper/src/vecinita_scraper/app.py
          modal deploy services/scraper/src/vecinita_scraper/api/app.py
          echo "✓ Scraper Modal apps deployed"

      - name: Verify Deployments
        if: steps.modal_auth.outputs.authenticated == 'true'
        run: |
          echo "Deployed apps (subset):"
          modal app list --all 2>/dev/null || echo "modal app list unavailable in this environment"

      - name: Modal Deployment Skipped
        if: steps.modal_auth.outputs.authenticated != 'true'
        run: echo "Modal deployment skipped; CI remains green until valid credentials are configured."

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: modal-deploy
    if: always()

    steps:
      - name: Success Notification
        if: needs.modal-deploy.result == 'success'
        run: |
          echo "✓ Modal deployment job finished successfully"
          echo "  Confirm hosts in the Modal dashboard (*.modal.run) match gateway env vars."

      - name: Failure Notification
        if: needs.modal-deploy.result == 'failure'
        run: |
          echo "✗ Modal deployment failed"
          exit 1
